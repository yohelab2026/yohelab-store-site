<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Articles | Yohe Lab</title>
  <meta name="description" content="English articles from Yohe Lab about AI publishing, article structure, WordPress, and practical tools." />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1" />
  <meta property="og:title" content="English Articles | Yohe Lab" />
  <meta property="og:description" content="English articles about AI publishing, article structure, WordPress, and practical tools." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:url" content="https://yohelab.com/en/blog/" />
  <meta property="og:image" content="https://yohelab.com/assets/og/bunsirube-og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://yohelab.com/en/blog/" />
  <link rel="alternate" hreflang="ja" href="https://yohelab.com/blog/" />
  <link rel="alternate" hreflang="en" href="https://yohelab.com/en/blog/" />
  <link rel="alternate" hreflang="x-default" href="https://yohelab.com/blog/" />
  <link rel="icon" type="image/png" href="/yohelab-mascot-v2-20260518-32.png" />
  <style>
    :root { --brand:#087a63;--brand-dark:#065f4d;--brand-light:#e8f7f3;--text:#17212b;--muted:#66727f;--border:#dfe5e8;--bg:#f4f7f6;--white:#fff; }
    * { box-sizing:border-box;margin:0;padding:0; }
    body { font-family:"Aptos","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65; }
    a { color:inherit;text-decoration:none; }
    :focus-visible { outline:3px solid #ffb703;outline-offset:3px; }
    .header { border-bottom:3px solid var(--brand);background:#fff; }
    .header-inner { width:min(980px,calc(100% - 32px));min-height:58px;margin:auto;display:flex;align-items:center;gap:14px; }
    .logo { display:flex;align-items:center;gap:9px;color:var(--brand);font-size:19px;font-weight:900; }
    .logo img { width:36px;height:36px;border-radius:8px; }
    .header-links { margin-left:auto;display:flex;align-items:center;gap:5px; }
    .header-links a { padding:7px 10px;border-radius:4px;color:#3e4b57;font-size:13px;font-weight:800; }
    .header-links a:hover { color:var(--brand);background:var(--brand-light); }
    .header-links .language { border:1px solid var(--border); }
    main { width:min(980px,calc(100% - 32px));margin:auto;padding:52px 0 80px; }
    .intro { max-width:680px;margin-bottom:30px; }
    .intro span { color:var(--brand);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em; }
    h1 { margin-top:8px;font-size:42px;line-height:1.1; }
    .intro p { margin-top:12px;color:var(--muted);font-size:16px; }
    .posts { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px; }
    .post { min-height:210px;padding:20px;border:1px solid var(--border);border-radius:8px;background:#fff;display:flex;flex-direction:column; }
    .post:hover { border-color:var(--brand); }
    .post time { color:var(--brand);font-size:12px;font-weight:850; }
    .post h2 { margin-top:9px;font-size:20px;line-height:1.3; }
    .post p { margin-top:8px;color:var(--muted);font-size:14px; }
    .post strong { margin-top:auto;padding-top:16px;color:var(--brand);font-size:13px; }
    .empty { padding:24px;border-left:4px solid var(--brand);background:#fff;color:var(--muted); }
    .pager { display:flex;gap:8px;margin-top:22px; }
    .pager button { min-height:40px;padding:7px 13px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--brand);font:inherit;font-size:13px;font-weight:850;cursor:pointer; }
    .pager button:disabled { opacity:.45;cursor:default; }
    footer { border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--muted);font-size:12px; }
    @media (max-width:680px) { .header-inner{width:calc(100% - 20px)}.header-links a:not(.language){display:none}main{padding-top:38px}.posts{grid-template-columns:1fr}h1{font-size:34px}.post{min-height:0} }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/en/"><img src="/yohelab-mascot-v2-20260518-64.png" width="36" height="36" alt="" />Yohe Lab</a>
      <nav class="header-links" aria-label="Main navigation">
        <a href="/en/">Home</a>
        <a href="/games/">Games</a>
        <a class="language" href="/blog/" hreflang="ja" lang="ja">日本語</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="intro">
      <span>English library</span>
      <h1>Articles from Yohe Lab</h1>
      <p>Practical notes on AI publishing, article structure, WordPress, and small tools. New English translations appear here automatically when published.</p>
    </div>
    <div id="posts" class="posts" aria-live="polite"><p class="empty">Loading articles...</p></div>
    <div class="pager">
      <button id="prev" type="button" disabled>Previous</button>
      <button id="next" type="button" disabled>Next</button>
    </div>
  </main>
  <footer>© Yohe Lab / yohelab.com</footer>
  <script>
    const postsEl = document.getElementById('posts');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    let page = 1;
    let totalPages = 1;

    async function loadPosts() {
      postsEl.innerHTML = '<p class="empty">Loading articles...</p>';
      try {
        const response = await fetch(`/api/blog-posts?locale=en&page=${page}`, { cache: 'no-store' });
        const data = await response.json();
        totalPages = Math.max(1, Number(data.totalPages) || 1);
        const posts = Array.isArray(data.posts) ? data.posts : [];
        postsEl.innerHTML = posts.length
          ? posts.map(post => `<a class="post" href="${escapeHtml(post.url)}"><time datetime="${escapeHtml(post.date)}">${formatDate(post.date)}</time><h2>${escapeHtml(post.title)}</h2><p>${escapeHtml(post.excerpt)}</p><strong>Read article →</strong></a>`).join('')
          : '<p class="empty">English translations are being prepared. You can browse the original Japanese articles from the language link above.</p>';
        prevBtn.disabled = page <= 1;
        nextBtn.disabled = page >= totalPages;
      } catch {
        postsEl.innerHTML = '<p class="empty">English translations are being prepared. You can browse the original Japanese articles from the language link above.</p>';
      }
    }

    function formatDate(value) {
      const date = new Date(`${value}T00:00:00+09:00`);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[char]);
    }

    prevBtn.addEventListener('click', () => { if (page > 1) { page -= 1; loadPosts(); } });
    nextBtn.addEventListener('click', () => { if (page < totalPages) { page += 1; loadPosts(); } });
    loadPosts();
  </script>
</body>
</html>
