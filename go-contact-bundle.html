<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>よへラボ | 5ツールセットの案内</title>
<link rel="icon" type="image/png" href="./yohelab-icon.png">
<style>
:root{
  --bg:#0a0a0f;
  --card:#141420;
  --border:#2a2a3e;
  --text:#ece9f6;
  --dim:#9a96ae;
  --accent:#6ee7b7;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at top right, rgba(110,231,183,0.12), transparent 28%),
    linear-gradient(180deg,#0a0a0f 0%,#11111a 100%);
  color:var(--text);
  font-family:"Yu Gothic","Hiragino Sans","Meiryo",sans-serif;
}
.card{
  width:min(720px,100%);
  padding:32px;
  border:1px solid var(--border);
  border-radius:28px;
  background:rgba(20,20,32,0.92);
  box-shadow:0 24px 70px rgba(0,0,0,0.32);
}
.kicker{
  display:inline-block;
  margin-bottom:14px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(110,231,183,0.14);
  color:var(--accent);
  font-size:12px;
  font-weight:700;
  letter-spacing:.12em;
}
h1{
  margin:0 0 14px;
  font-size:clamp(28px,5vw,40px);
  line-height:1.3;
}
p{
  margin:0;
  color:var(--dim);
  line-height:1.9;
}
.price{
  margin:22px 0 10px;
  font-size:14px;
  color:var(--dim);
}
.price strong{
  color:var(--text);
  font-size:34px;
}
.note{
  margin-top:14px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(110,231,183,0.18);
  background:rgba(110,231,183,0.08);
  color:#d9f9ea;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:28px;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:52px;
  padding:0 22px;
  border-radius:14px;
  font-weight:700;
  text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,#6ee7b7 0%,#34d399 100%);
  color:#07110d;
}
.btn-secondary{
  border:1px solid var(--border);
  color:var(--text);
}
.links{
  margin-top:24px;
  display:grid;
  gap:10px;
  color:var(--dim);
  font-size:14px;
}
@media (max-width:640px){
  .card{padding:24px}
  .actions{flex-direction:column}
  .btn{width:100%}
}
</style>
</head>
<body>
  <main class="card">
    <div class="kicker">BUNDLE GUIDE</div>
    <h1>5ツールセットは<br>今は個別案内で受け付けてる</h1>
    <p>単品5本はそのままStripeで購入できる。セット価格の本番決済リンクはまだ準備中だから、今はまとめ買い希望だけ先にメールで受けている。</p>
    <div class="price">まとめ価格 <strong>¥4,980</strong> / 通常合計 ¥13,400</div>
    <div class="note">件名入りのメールが開くようにしてある。希望を送ってもらえれば、セット案内を返す。</div>
    <div class="actions">
      <a class="btn btn-primary" href="mailto:yohelab2026@gmail.com?subject=%E5%85%A85%E3%83%84%E3%83%BC%E3%83%AB%E3%81%BE%E3%81%A8%E3%82%81%E8%B3%BC%E5%85%A5%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6">メールを開く</a>
      <a class="btn btn-secondary" href="./freelancer-tools.html">フリーランス向け一覧に戻る</a>
      <a class="btn btn-secondary" href="./index.html">総合トップに戻る</a>
    </div>
    <div class="links">
      <div>問い合わせ先: yohelab2026@gmail.com</div>
      <div>単品購入は各商品の「今すぐ購入する」からそのまま進める。</div>
    </div>
  </main>
</body>
</html>
