  <style>
    :root {
      --green: #087a63;
      --green-dark: #065f4d;
      --ink: #111827;
      --muted: #53635d;
      --line: #d8e8e2;
      --warning: #f5c451;
      --warning-dark: #77530b;
      --paper: #fffdf7;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% -10%, rgba(8,122,99,.14), transparent 34%),
        linear-gradient(180deg, #f2fbf7 0%, #ffffff 58%, #fbfdfb 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 18px;
    }

    .panel {
      width: min(620px, 100%);
      text-align: center;
    }

    .icon-frame {
      position: relative;
      width: 210px;
      margin: 0 auto 26px;
      padding: 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 22px 56px rgba(8,45,36,.1);
    }

    .icon-frame::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 3px dashed rgba(245,196,81,.78);
      border-radius: 6px;
      pointer-events: none;
    }

    .icon-frame img {
      position: relative;
      width: 174px;
      margin: 0 auto;
      border-radius: 24px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e3c770;
      color: var(--warning-dark);
      font-size: 12px;
      font-weight: 900;
    }

    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(245,196,81,.18);
    }

    h1 {
      margin: 20px 0 14px;
      font-size: clamp(40px, 9vw, 72px);
      line-height: 1.06;
      letter-spacing: 0;
      font-weight: 900;
    }

    p {
      max-width: 500px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 18px);
    }

    .stripe {
      width: min(420px, 100%);
      height: 18px;
      margin: 32px auto 0;
      border-radius: 999px;
      border: 1px solid rgba(119,83,11,.16);
      background: repeating-linear-gradient(
        135deg,
        rgba(245,196,81,.9) 0 16px,
        rgba(255,255,255,.9) 16px 32px
      );
    }

    .copyright {
      margin-top: 24px;
      color: #78857f;
      font-size: 12px;
    }

    @media (max-width: 520px) {
      .page {
        align-items: start;
        padding-top: 42px;
      }

      .icon-frame {
        width: 188px;
      }

      .icon-frame img {
        width: 152px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-label="整備中のお知らせ">
      <div class="icon-frame">
        <img src="/yohelab-mascot-v2-20260518-192.png" alt="よへラボ" width="192" height="192" decoding="async" />
      </div>
      <span class="status">整備中</span>
      <h1>ただいま工事中です</h1>
      <p>よへラボのトップページを整えています。しばらくお待ちください。</p>
      <div class="stripe" aria-hidden="true"></div>
      <div class="copyright">© よへラボ / yohelab.com</div>
    </section>
  </main>
