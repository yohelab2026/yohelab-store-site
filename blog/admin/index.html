<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブログ編集 | よへラボ</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <style>
    body { background:#f6fbf8; }
    .shell { padding: 84px 0 60px; }
    .admin-head { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:18px; }
    .admin-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .admin-head h1 { font-size:32px; margin:0; }
    .grid { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:20px; align-items:start; }
    .panel { background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-xs); padding:22px; }
    .panel h1 { font-size:34px; letter-spacing:-.04em; margin-bottom:10px; }
    .panel h2 { font-size:18px; margin-bottom:14px; }
    .panel p { color:var(--muted); line-height:1.8; }
    .form { display:grid; gap:14px; }
    label { display:grid; gap:6px; font-size:13px; font-weight:700; color:var(--text-sub); }
    input, textarea { width:100%; border:1px solid var(--border); border-radius:12px; padding:12px 14px; font-size:15px; }
    textarea { min-height: 140px; resize: vertical; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .toolbar button, .toolbar select, .toolbar input[type="color"] { border:1px solid var(--border); background:#fff; color:var(--text); border-radius:10px; padding:8px 10px; font-size:13px; font-weight:700; cursor:pointer; min-height:38px; }
    .toolbar input[type="color"] { width:46px; padding:4px; }
    .title-input { font-size:28px; font-weight:800; padding:16px 18px; }
    .editor { min-height: 420px; border:1px solid var(--border); border-radius:12px; padding:18px; background:#fff; outline:none; line-height:1.85; }
    .editor:empty::before { content: attr(data-placeholder); color: #94a3b8; }
    .preview { border:1px solid var(--border); border-radius:16px; padding:18px; background:#fff; }
    .preview h2 { font-size:24px; margin-bottom:10px; }
    .preview p { color:var(--text); line-height:1.9; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .status { padding:12px 14px; border-radius:12px; background:#f7fbf9; border:1px solid var(--border); color:var(--muted); font-size:14px; }
    .hint { font-size:13px; color:var(--muted); line-height:1.75; }
    .lock-screen { position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:20px; background:#f6fbf8; }
    .lock-box { width:min(420px,100%); background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); padding:28px; }
    .lock-box h1 { font-size:28px; margin-bottom:10px; }
    .lock-box p { color:var(--muted); line-height:1.8; margin-bottom:18px; }
    .lock-box input { font-size:24px; letter-spacing:.28em; text-align:center; }
    body.is-unlocked .lock-screen { display:none; }
    body:not(.is-unlocked) .shell, body:not(.is-unlocked) header { display:none; }
    @media (max-width: 920px) { .grid { grid-template-columns:1fr; } .admin-head { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
  <div class="lock-screen" id="lock-screen">
    <div class="lock-box">
      <!-- 初回セットアップ画面 -->
      <div id="setup-view" style="display:none;">
        <h1>パスワードを決める</h1>
        <p>好きな数字4桁を決めて入れてください。次回からこのパスワードで入れます。</p>
        <div class="form">
          <label>パスワード（4桁の数字）<input id="setup-pin" inputmode="numeric" maxlength="4" autocomplete="new-password" placeholder="例: 7392" /></label>
          <label>確認（もう一度）<input id="setup-pin2" inputmode="numeric" maxlength="4" autocomplete="new-password" placeholder="もう一度入れる" /></label>
          <button class="btn btn-primary btn-lg" id="setup-submit" type="button">このパスワードで始める</button>
        </div>
        <p class="hint" id="setup-status" style="margin-top:14px;"></p>
      </div>
      <!-- ログイン画面 -->
      <div id="login-view" style="display:none;">
        <h1>ブログ管理</h1>
        <p>4桁のパスワードで入る。</p>
        <div class="form">
          <label>パスワード<input id="admin-pin" inputmode="numeric" maxlength="4" autocomplete="current-password" placeholder="●●●●" /></label>
          <button class="btn btn-primary btn-lg" id="unlock-admin" type="button">入る</button>
        </div>
        <p class="hint" id="lock-status" style="margin-top:14px;"></p>
      </div>
    </div>
  </div>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/"><img src="/yohelab-icon.png" alt="よへラボのアイコン" /><span>よへラボ</span></a>
      <nav class="nav-links">
        <a href="/blog/">ブログ</a>
        <a href="/apps/research-writer/">記事メーカー</a>
        <a href="/apps/wordpress-theme/">テーマ</a>
      </nav>
    </div>
  </header>
  <main class="shell">
    <div class="container">
      <div class="admin-head">
        <h1>新規投稿</h1>
        <div class="admin-actions">
          <button class="btn btn-outline btn-lg" id="logout-admin" type="button">ログアウト</button>
          <button class="btn btn-primary btn-lg" id="post-json-top" type="button">公開する</button>
        </div>
      </div>
    </div>
    <div class="container grid">
      <div class="panel">
        <div class="form">
          <label>タイトル<input class="title-input" id="title" placeholder="タイトルを追加" /></label>
          <div>
            <div class="toolbar">
              <select id="format-select" aria-label="段落">
                <option value="P">本文</option>
                <option value="H2">見出し2</option>
                <option value="H3">見出し3</option>
                <option value="BLOCKQUOTE">引用</option>
              </select>
              <select id="font-select" aria-label="フォント">
                <option value="">標準</option>
                <option value="'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif">ゴシック</option>
                <option value="'Yu Mincho', 'Hiragino Mincho ProN', serif">明朝</option>
                <option value="'BIZ UDPGothic', sans-serif">読みやすい</option>
                <option value="'Noto Sans JP', sans-serif">すっきり</option>
              </select>
              <select id="size-select" aria-label="文字サイズ">
                <option value="">サイズ</option>
                <option value="0.9">小</option>
                <option value="1">標準</option>
                <option value="1.2">大</option>
                <option value="1.45">特大</option>
              </select>
              <button data-cmd="bold" type="button">B</button>
              <button data-cmd="italic" type="button">I</button>
              <button data-cmd="underline" type="button">U</button>
              <button data-cmd="insertUnorderedList" type="button">箇条書き</button>
              <button data-align="left" type="button">左</button>
              <button data-align="center" type="button">中央</button>
              <button data-align="right" type="button">右</button>
              <button data-color="#0b8f72" type="button">緑</button>
              <button data-color="#1d6fd8" type="button">青</button>
              <button data-color="#ef4444" type="button">赤</button>
              <input id="text-color" type="color" value="#0b8f72" aria-label="文字色" />
              <input id="bg-color" type="color" value="#fff3bf" aria-label="背景色" />
              <button id="clear-style" type="button">色を戻す</button>
            </div>
            <div id="body" class="editor" contenteditable="true" data-placeholder="本文を書く"></div>
          </div>
        </div>
      </div>
      <aside class="panel">
        <h2>公開</h2>
        <div class="status" id="status">下書き中</div>
        <div class="actions">
          <button class="btn btn-primary btn-lg" id="post-json" type="button">公開する</button>
          <button class="btn btn-outline btn-lg" id="save-draft" type="button">下書きを保存</button>
        </div>
        <hr style="border:0;border-top:1px solid var(--border);margin:18px 0;">
        <h2>記事設定</h2>
        <div class="form">
          <label>スラッグ<input id="slug" placeholder="未入力なら自動作成" /></label>
          <label>要約<textarea id="excerpt" placeholder="一覧に出す短い説明"></textarea></label>
          <label>タグ<input id="tags" placeholder="AI検索, WordPress, お知らせ" /></label>
          <label>アイキャッチ画像URL<input id="eyecatch" placeholder="https://... （省略可）" /></label>
          <div id="eyecatch-preview" style="display:none;margin-top:6px;border-radius:10px;overflow:hidden;border:1px solid var(--border);"><img id="eyecatch-img" src="" alt="アイキャッチ" style="width:100%;display:block;max-height:160px;object-fit:cover;" /></div>
        </div>
      </aside>
    </div>

    <div class="container" style="margin-top:20px;">
      <div class="panel">
        <div class="preview" id="preview">
          <h2>プレビュー</h2>
          <p id="preview-excerpt">要約がここに出る。</p>
          <div id="preview-body" style="margin-top:16px;color:var(--text);line-height:1.9;"></div>
        </div>
      </div>
    </div>
  </main>
  <script>
    const titleEl = document.getElementById('title');
    const slugEl = document.getElementById('slug');
    const excerptEl = document.getElementById('excerpt');
    const bodyEl = document.getElementById('body');
    const tagsEl = document.getElementById('tags');
    const eyecatchEl = document.getElementById('eyecatch');
    const eyecatchPreviewEl = document.getElementById('eyecatch-preview');
    const eyecatchImgEl = document.getElementById('eyecatch-img');
    const statusEl = document.getElementById('status');
    const previewExcerptEl = document.getElementById('preview-excerpt');
    const previewBodyEl = document.getElementById('preview-body');
    const PIN_KEY = 'yohelab.blog.pin';      // localStorage: 保存PIN
    const SESSION_KEY = 'yohelab.blog.sess'; // sessionStorage: ログイン済みフラグ

    const setupView  = document.getElementById('setup-view');
    const loginView  = document.getElementById('login-view');
    const setupPinEl  = document.getElementById('setup-pin');
    const setupPin2El = document.getElementById('setup-pin2');
    const setupStatusEl = document.getElementById('setup-status');
    const adminPinEl    = document.getElementById('admin-pin');
    const lockStatusEl  = document.getElementById('lock-status');

    // 保存済みPINがあるかで初回セットアップかログインかを切り替える
    function showLockScreen() {
      const stored = localStorage.getItem(PIN_KEY);
      if (stored) {
        setupView.style.display = 'none';
        loginView.style.display = '';
        adminPinEl.focus();
      } else {
        setupView.style.display = '';
        loginView.style.display = 'none';
        setupPinEl.focus();
      }
    }

    // セッション済みなら即開く
    if (sessionStorage.getItem(SESSION_KEY)) {
      document.body.classList.add('is-unlocked');
    } else {
      showLockScreen();
    }

    // 初回セットアップ
    function handleSetup() {
      const p1 = setupPinEl.value.trim();
      const p2 = setupPin2El.value.trim();
      if (!/^\d{4}$/.test(p1)) { setupStatusEl.textContent = '数字4桁で入れて。'; return; }
      if (p1 !== p2) { setupStatusEl.textContent = '2つのパスワードが一致しない。'; return; }
      localStorage.setItem(PIN_KEY, p1);
      sessionStorage.setItem(SESSION_KEY, '1');
      document.body.classList.add('is-unlocked');
    }
    document.getElementById('setup-submit').addEventListener('click', handleSetup);
    setupPin2El.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSetup(); });

    // ログイン
    function handleLogin() {
      const stored = localStorage.getItem(PIN_KEY);
      const input = adminPinEl.value.trim();
      if (!stored) { showLockScreen(); return; }
      if (input !== stored) { lockStatusEl.textContent = 'パスワードが違う。'; adminPinEl.value = ''; adminPinEl.focus(); return; }
      sessionStorage.setItem(SESSION_KEY, '1');
      document.body.classList.add('is-unlocked');
    }
    document.getElementById('unlock-admin').addEventListener('click', handleLogin);
    adminPinEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });

    // ログアウト
    document.getElementById('logout-admin').addEventListener('click', () => {
      sessionStorage.removeItem(SESSION_KEY);
      document.body.classList.remove('is-unlocked');
      adminPinEl.value = '';
      lockStatusEl.textContent = 'ログアウトした。';
      showLockScreen();
    });

    function updatePreview() {
      previewExcerptEl.textContent = excerptEl.value || '要約がここに出る。';
      previewBodyEl.innerHTML = bodyEl.innerHTML || '<p>本文がここに出る。</p>';
      const eyecatchUrl = eyecatchEl.value.trim();
      if (eyecatchUrl) {
        eyecatchImgEl.src = eyecatchUrl;
        eyecatchPreviewEl.style.display = '';
      } else {
        eyecatchPreviewEl.style.display = 'none';
      }
      localStorage.setItem('yohelab.blog.draft', JSON.stringify({
        title: titleEl.value,
        slug: slugEl.value,
        excerpt: excerptEl.value,
        bodyHtml: bodyEl.innerHTML,
        tags: tagsEl.value,
        eyecatch: eyecatchEl.value,
      }));
    }

    function wrapSelection(tagName, style = '') {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (range.collapsed) return;
      const wrapper = document.createElement(tagName);
      if (style) wrapper.setAttribute('style', style);
      wrapper.appendChild(range.extractContents());
      range.insertNode(wrapper);
      sel.removeAllRanges();
      updatePreview();
    }

    document.querySelectorAll('[data-cmd]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const cmd = btn.dataset.cmd;
        document.execCommand(cmd, false, null);
        updatePreview();
      });
    });
    document.querySelectorAll('[data-color]').forEach((btn) => {
      btn.addEventListener('click', () => wrapSelection('span', `color:${btn.dataset.color};font-weight:700;`));
    });
    document.querySelectorAll('[data-align]').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.execCommand(`justify${btn.dataset.align[0].toUpperCase()}${btn.dataset.align.slice(1)}`, false, null);
        updatePreview();
      });
    });
    document.getElementById('format-select').addEventListener('change', (event) => {
      document.execCommand('formatBlock', false, event.target.value);
      event.target.value = 'P';
      updatePreview();
    });
    document.getElementById('font-select').addEventListener('change', (event) => {
      if (event.target.value) wrapSelection('span', `font-family:${event.target.value};`);
      event.target.value = '';
    });
    document.getElementById('size-select').addEventListener('change', (event) => {
      if (event.target.value) wrapSelection('span', `font-size:${event.target.value}em;`);
      event.target.value = '';
    });
    document.getElementById('text-color').addEventListener('input', (event) => {
      wrapSelection('span', `color:${event.target.value};font-weight:700;`);
    });
    document.getElementById('bg-color').addEventListener('input', (event) => {
      wrapSelection('span', `background:${event.target.value};padding:0 .18em;border-radius:4px;`);
    });
    document.getElementById('clear-style').addEventListener('click', () => {
      document.execCommand('removeFormat', false, null);
      updatePreview();
    });

    ['input', 'keyup', 'paste'].forEach((eventName) => {
      [titleEl, slugEl, excerptEl, tagsEl, bodyEl, eyecatchEl].forEach((el) => el.addEventListener(eventName, updatePreview));
    });
    bodyEl.addEventListener('blur', updatePreview);

    const draft = localStorage.getItem('yohelab.blog.draft');
    if (draft) {
      try {
        const parsed = JSON.parse(draft);
        titleEl.value = parsed.title || '';
        slugEl.value = parsed.slug || '';
        excerptEl.value = parsed.excerpt || '';
        bodyEl.innerHTML = parsed.bodyHtml || '';
        tagsEl.value = parsed.tags || '';
        eyecatchEl.value = parsed.eyecatch || '';
      } catch (_) {}
    }
    updatePreview();

    function htmlToMarkdown(html) {
      return html
        .replace(/<strong>(.*?)<\/strong>/gi, '**$1**')
        .replace(/<b>(.*?)<\/b>/gi, '**$1**')
        .replace(/<em>(.*?)<\/em>/gi, '*$1*')
        .replace(/<i>(.*?)<\/i>/gi, '*$1*')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<div>/gi, '')
        .replace(/<\/div>/gi, '\n')
        .replace(/<p>/gi, '')
        .replace(/<\/p>/gi, '\n\n')
        .replace(/<[^>]+>/g, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function makeSlug(text) {
      const fallback = `post-${new Date().toISOString().slice(0, 10)}`;
      return String(text || fallback)
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9ぁ-んァ-ヶ一-龠ー._-]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 80) || fallback;
    }

    function buildJson() {
      const eyecatch = eyecatchEl.value.trim();
      const post = {
        title: titleEl.value.trim(),
        slug: slugEl.value.trim() || makeSlug(titleEl.value),
        date: new Date().toISOString().slice(0, 10),
        excerpt: excerptEl.value.trim(),
        bodyHtml: bodyEl.innerHTML,
        body: htmlToMarkdown(bodyEl.innerHTML),
        tags: tagsEl.value.split(',').map(v => v.trim()).filter(Boolean),
      };
      if (eyecatch) post.eyecatch = eyecatch;
      return post;
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
      statusEl.textContent = 'コピーした。';
    }

    async function postBlog() {
      const post = buildJson();
      const pin = (localStorage.getItem(PIN_KEY) || '').trim();
      if (!pin) {
        document.body.classList.remove('is-unlocked');
        sessionStorage.removeItem(SESSION_KEY);
        showLockScreen();
        statusEl.textContent = 'もう一度ログインして。';
        return;
      }
      const response = await fetch('/api/blog-post', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Yohelab-Pin': pin,
        },
        body: JSON.stringify(post),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const messages = {
          'BLOG_KV is not configured': 'CloudflareにBLOG_KVの設定が必要です。',
          unauthorized: 'パスワードが違います。',
          title_required: 'タイトルを入れてください。',
        };
        statusEl.textContent = messages[data.error] || data.error || '投稿に失敗した。';
        return;
      }
      localStorage.setItem('yohelab.blog.lastExport', JSON.stringify(data.post, null, 2));
      statusEl.textContent = `投稿した。${data.path}`;
    }

    document.getElementById('post-json').addEventListener('click', postBlog);
    document.getElementById('post-json-top').addEventListener('click', postBlog);

    const copyHtmlBtn = document.getElementById('copy-html');
    if (copyHtmlBtn) copyHtmlBtn.addEventListener('click', async () => {
      const html = `<h1>${titleEl.value}</h1>\n<p>${excerptEl.value}</p>\n${bodyEl.innerHTML}`;
      await copyText(html);
    });

    document.getElementById('save-draft').addEventListener('click', () => {
      localStorage.setItem('yohelab.blog.lastExport', JSON.stringify(buildJson(), null, 2));
      statusEl.textContent = '下書きを保存した。';
    });
  </script>
</body>
</html>
