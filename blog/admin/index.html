<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブログ編集 | よへラボ</title>
  <meta name="description" content="よへラボのブログ記事を編集するための管理ページです。公開ページではなく、記事本文、画像、公開状態を確認するための画面です。" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://yohelab.com/blog/admin/" />
  <link rel="icon" type="image/png" href="/yohelab-mascot-v2-20260518-32.png" />
  <link rel="stylesheet" href="/shared/site.min.css" />
  <style>
    body { background: #f6fbf8; }

    /* ── ロック画面 ── */
    .lock-screen { position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;background:#f6fbf8; }
    .lock-box { width:min(420px,100%);background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:32px; }
    .lock-box h1 { font-size:26px;font-weight:900;margin-bottom:8px; }
    .lock-box p { color:var(--muted);line-height:1.8;margin-bottom:18px;font-size:15px; }
    .lock-box input { font-size:22px;letter-spacing:.24em;text-align:center; }
    body.is-unlocked .lock-screen { display:none; }
    body:not(.is-unlocked) .shell, body:not(.is-unlocked) header { display:none; }

    /* ── ナビ（スティッキー） ── */
    .admin-nav { position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 0; }
    .admin-nav .inner { width:min(1180px,100% - 32px);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px; }
    .admin-nav .brand { font-weight:900;font-size:15px;color:var(--text);text-decoration:none; }
    .nav-actions { display:flex;gap:8px;align-items:center; }
    #status { font-size:13px;color:var(--muted); }

    /* ── エディタ本体 ── */
    .admin-workbench { width:min(1180px,100% - 32px);margin:0 auto;padding:28px 0 96px;display:grid;grid-template-columns:320px minmax(0,1fr);gap:22px;align-items:start; }
    .content-manager { position:sticky;top:78px;display:grid;gap:14px;max-height:calc(100vh - 100px);overflow:auto;padding-right:2px; }
    .manager-card { background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 28px rgba(14,55,42,.06);overflow:hidden; }
    .manager-head { display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 14px 12px;border-bottom:1px solid var(--border); }
    .manager-head h2 { font-size:16px;font-weight:900;margin:0; }
    .manager-head p { font-size:12px;color:var(--muted);margin:3px 0 0;line-height:1.5; }
    .manager-list { display:grid;gap:0; }
    .editor-panel { min-width:0;background:rgba(255,255,255,.62);border:1px solid var(--border);border-radius:24px;box-shadow:0 18px 45px rgba(14,55,42,.06); }
    .editor-wrap { width:min(760px,100% - 36px);margin:0 auto;padding:32px 0 64px; }
    .editor-state { display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:18px;color:var(--muted);font-size:13px;font-weight:700; }
    .state-pill { display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 12px;background:#e8f7f1;color:var(--green);font-weight:900; }

    /* カバー画像エリア */
    .cover-area { margin-bottom:28px; }
    .cover-drop {
      width:100%;aspect-ratio:16/9;max-height:480px;border-radius:18px;border:2px dashed var(--border);
      background:#f0f8f4;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:10px;cursor:pointer;transition:border-color .2s,background .2s;
      font-size:14px;color:var(--muted);font-weight:600;
    }
    .cover-drop:hover { border-color:var(--green);background:#e8f7f1; }
    .cover-preview { position:relative;border-radius:18px;overflow:hidden; }
    .cover-preview img { width:100%;aspect-ratio:16/9;max-height:480px;object-fit:cover;display:block; }
    .cover-preview .cover-actions {
      position:absolute;bottom:12px;right:12px;display:flex;gap:8px;
    }
    .cover-btn {
      background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;
      padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);
    }
    .cover-btn:hover { background:rgba(0,0,0,.75); }

    /* タイトル */
    .title-field {
      font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:-.04em;
      border:none;outline:none;width:100%;background:transparent;
      color:var(--text);line-height:1.2;margin-bottom:8px;
      padding:0;resize:none;font-family:inherit;
    }
    .title-field::placeholder { color:#c0cac5; }

    /* ツールバー */
    .toolbar {
      display:flex;flex-wrap:wrap;gap:4px;padding:10px 0;
      border-top:1px solid var(--border);border-bottom:1px solid var(--border);
      margin-bottom:20px;position:sticky;top:57px;z-index:30;
      background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
    }
    .toolbar button, .toolbar select {
      border:1px solid var(--border);background:#fff;color:var(--text);
      border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;
      cursor:pointer;min-height:34px;transition:background .15s;
    }
    .toolbar button:hover { background:var(--bg); }
    .toolbar input[type="color"] { width:34px;height:34px;padding:2px;border-radius:8px;border:1px solid var(--border);cursor:pointer; }

    /* 本文エディタ */
    .body-editor {
      min-height:480px;outline:none;font-size:17px;line-height:1.95;color:var(--text);
      caret-color:var(--green);
    }
    .body-editor:empty::before { content:attr(data-placeholder);color:#b0bec5;pointer-events:none; }
    .body-editor h2 { font-size:24px;font-weight:900;margin:32px 0 12px;letter-spacing:-.03em; }
    .body-editor h3 { font-size:20px;font-weight:800;margin:24px 0 10px; }
    .body-editor p { margin-bottom:16px; }
    .body-editor ul, .body-editor ol { padding-left:24px;margin-bottom:16px; }
    .body-editor li { margin-bottom:6px; }
    .body-editor blockquote { border-left:4px solid var(--green);padding:10px 16px;background:var(--bg);border-radius:0 10px 10px 0;margin:16px 0;color:var(--muted); }

    /* メタ設定パネル（折りたたみ） */
    .meta-toggle { display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:700;margin:32px 0 0;user-select:none;border:none;background:none;padding:0; }
    .meta-panel { display:grid;gap:14px;margin-top:16px;padding:20px;background:#fff;border:1px solid var(--border);border-radius:16px; }
    label.meta-label { display:grid;gap:6px;font-size:13px;font-weight:700;color:var(--text-sub); }
    label.meta-label input, label.meta-label textarea { border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;width:100%; }
    label.meta-label textarea { min-height:80px;resize:vertical; }

    /* 投稿一覧 */
    .post-list-item { display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--border); }
    .post-list-item:hover { background:#f6fbf8; }
    .post-list-item.is-active { background:#e8f7f1; }
    .post-list-item img { width:56px;height:40px;object-fit:cover;border-radius:8px;flex-shrink:0; }
    .post-list-item .info { flex:1;min-width:0; }
    .post-list-item .info strong { display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .post-list-item .info span { font-size:12px;color:var(--muted); }
    .post-list-item .actions { display:flex;gap:6px;flex-shrink:0; }
    .btn-del { font-size:12px;padding:5px 10px;color:#ef4444;border-color:#ef4444;border-radius:8px;border:1px solid;background:none;cursor:pointer; }
    .btn-del:hover { background:#fef2f2; }
    .btn-view, .btn-edit, .btn-draft { font-size:12px;padding:5px 9px;color:var(--green);border:1px solid var(--green);border-radius:8px;background:#fff;font-weight:800;text-decoration:none;cursor:pointer;white-space:nowrap; }
    .btn-view:hover, .btn-edit:hover, .btn-draft:hover { background:#effaf6; }
    .btn-draft { color:#7c5b00;border-color:#eab308; }
    .draft-list-item { display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--border); }
    .draft-list-item:hover { background:#f6fbf8; }
    .draft-list-item.is-active { background:#e8f7f1; }
    .draft-list-item .info { flex:1;min-width:0; }
    .draft-list-item .info strong { display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .draft-list-item .info span { font-size:12px;color:var(--muted); }
    .draft-list-item .actions { display:flex;gap:6px;flex-shrink:0; }
    .btn-open-draft { font-size:12px;padding:5px 10px;color:var(--green);border:1px solid var(--green);border-radius:8px;background:#fff;font-weight:700;cursor:pointer; }
    .btn-open-draft:hover { background:#f0f8f4; }

    @media (max-width: 600px) {
      .admin-workbench { width:100%;padding:0 0 72px;display:flex;flex-direction:column-reverse;gap:16px; }
      .content-manager { position:static;max-height:none;width:calc(100% - 24px);margin:0 auto; }
      .editor-panel { border-radius:0;border-left:0;border-right:0;box-shadow:none; }
      .editor-wrap { width:calc(100% - 32px);padding:24px 0 48px; }
      .toolbar { top:53px; }
      .admin-nav .inner { align-items:flex-start; }
      .nav-actions { flex-wrap:wrap; justify-content:flex-end; max-width:260px; }
      .nav-actions .btn { padding:7px 10px; font-size:12px; }
      #status { width:100%; text-align:right; }
      .post-list-item, .draft-list-item { align-items:flex-start; }
      .post-list-item .actions, .draft-list-item .actions { flex-wrap:wrap;justify-content:flex-end; }
    }
  </style>
</head>
<body>

  <!-- ロック画面 -->
  <div class="lock-screen" id="lock-screen">
    <div class="lock-box">
      <div id="login-view">
        <h1>ブログ管理</h1>
        <p>4桁のパスワードで入る。</p>
        <div style="display:grid;gap:12px;">
          <input id="admin-pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="●●●●" style="font-size:22px;letter-spacing:.24em;text-align:center;border:1px solid var(--border);border-radius:12px;padding:12px;" />
          <button class="btn btn-primary btn-lg" id="unlock-admin" type="button">入る</button>
        </div>
        <p style="font-size:13px;color:var(--muted);margin-top:12px;" id="lock-status"></p>
      </div>
    </div>
  </div>

  <!-- ナビ -->
  <nav class="admin-nav">
    <div class="inner">
      <a class="brand" href="/blog/">← ブログ</a>
      <div class="nav-actions">
        <span id="status">下書き中</span>
        <button class="btn btn-outline" id="new-post" type="button">新規</button>
        <button class="btn btn-outline" id="save-draft" type="button">下書き保存</button>
        <button class="btn btn-primary" id="post-btn" type="button">公開する</button>
        <button class="btn btn-outline" id="logout-admin" type="button" style="color:var(--muted);">ログアウト</button>
      </div>
    </div>
  </nav>

  <main class="shell" style="padding-top:0;">
    <div class="admin-workbench">
      <aside class="content-manager" aria-label="記事一覧">
        <section class="manager-card">
          <div class="manager-head">
            <div>
              <h2>下書き</h2>
              <p>途中の記事を開いて編集できます。</p>
            </div>
            <button class="btn btn-outline" id="refresh-drafts" type="button">更新</button>
          </div>
          <div id="draft-list" class="manager-list">
            <p style="color:var(--muted);font-size:14px;padding:14px;">読み込み中...</p>
          </div>
        </section>

        <section class="manager-card">
          <div class="manager-head">
            <div>
              <h2>公開済み</h2>
              <p>表示・編集・下書き戻しができます。</p>
            </div>
            <button class="btn btn-outline" id="refresh-posts" type="button">更新</button>
          </div>
          <div id="post-list" class="manager-list">
            <p style="color:var(--muted);font-size:14px;padding:14px;">読み込み中...</p>
          </div>
        </section>

      </aside>

      <section class="editor-panel" aria-label="記事エディタ">
        <div class="editor-wrap">
          <div class="editor-state">
            <span class="state-pill" id="editor-mode">新規記事</span>
            <span id="editor-hint">左の一覧から下書きや公開済み記事を開けます。</span>
          </div>

      <!-- カバー画像 -->
      <div class="cover-area" id="cover-area">
        <div class="cover-drop" id="cover-drop" onclick="document.getElementById('cover-file').click()">
          <span style="font-size:28px;">🖼</span>
          <span>カバー画像を追加（タップ or ドロップ）</span>
          <span style="font-size:12px;font-weight:400;">JPG / PNG / WebPを自動でWebP 1枚に変換</span>
        </div>
        <div class="cover-preview" id="cover-preview" style="display:none;">
          <img id="cover-img" src="" alt="カバー" />
          <div class="cover-actions">
            <button class="cover-btn" type="button" onclick="document.getElementById('cover-file').click()">変更</button>
            <button class="cover-btn" id="cover-remove" type="button">削除</button>
          </div>
        </div>
        <input id="cover-file" type="file" accept="image/jpeg,image/png,image/webp" style="display:none;" />
        <input id="eyecatch" type="hidden" />
      </div>

      <!-- タイトル -->
      <textarea id="title" class="title-field" placeholder="タイトルを入力" rows="1" spellcheck="false"></textarea>

      <!-- ツールバー -->
      <div class="toolbar">
        <select id="format-select" aria-label="段落スタイル">
          <option value="P">本文</option>
          <option value="H2">見出し2</option>
          <option value="H3">見出し3</option>
          <option value="BLOCKQUOTE">引用</option>
        </select>
        <button data-cmd="bold" title="太字"><b>B</b></button>
        <button data-cmd="italic" title="斜体"><i>I</i></button>
        <button data-cmd="underline" title="下線"><u>U</u></button>
        <button data-cmd="insertUnorderedList" title="箇条書き">・リスト</button>
        <button data-cmd="insertOrderedList" title="番号リスト">1.リスト</button>
        <button data-align="left">左</button>
        <button data-align="center">中央</button>
        <button data-align="right">右</button>
        <button data-color="#0b8f72" style="color:#0b8f72;">■緑</button>
        <button data-color="#1d6fd8" style="color:#1d6fd8;">■青</button>
        <button data-color="#ef4444" style="color:#ef4444;">■赤</button>
        <input id="text-color" type="color" value="#0b8f72" title="文字色" />
        <input id="bg-color" type="color" value="#fff3bf" title="マーカー色" />
        <button id="clear-style">スタイル解除</button>
        <button id="insert-img-btn" title="画像を挿入">📷 画像</button>
        <input id="insert-img-file" type="file" accept="image/jpeg,image/png,image/webp" style="display:none;" />
      </div>

      <!-- 本文 -->
      <div id="body" class="body-editor" contenteditable="true" data-placeholder="本文を書く..."></div>

      <!-- メタ設定 -->
      <button class="meta-toggle" id="meta-toggle" type="button">⚙ 記事設定（要約・タグ・スラッグ）▾</button>
      <div class="meta-panel" id="meta-panel" style="display:none;">
        <label class="meta-label">要約（一覧に出る短い説明）<textarea id="excerpt" placeholder="この記事の要約を書く"></textarea></label>
        <label class="meta-label">タグ<input id="tags" placeholder="記事作成, WordPress, お知らせ" /></label>
        <label class="meta-label">スラッグ（URL）
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="slug" placeholder="未入力ならタイトルから生成" style="flex:1;" />
            <button type="button" id="gen-slug" style="white-space:nowrap;border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">🎲 自動生成</button>
          </div>
        </label>
      </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / yohelab.com</div>
      <div class="footer-links">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
        <a href="/legal/commerce/">特定商取引法</a>
        <a href="/legal/privacy/">プライバシー</a>
        <a href="/legal/terms/">利用規約</a>
      </div>
    </div>
  </footer>

  <script>
  // ── 定数・要素 ──────────────────────────────────────────────
  const SESSION_KEY = 'yohelab.blog.sess';
  const SESSION_PIN_KEY = 'yohelab.blog.pin.session';
  const SAVED_PIN_KEY = 'yohelab.blog.pin.saved';

  const titleEl    = document.getElementById('title');
  const bodyEl     = document.getElementById('body');
  const excerptEl  = document.getElementById('excerpt');
  const tagsEl     = document.getElementById('tags');
  const slugEl     = document.getElementById('slug');
  const eyecatchEl = document.getElementById('eyecatch');
  const statusEl   = document.getElementById('status');
  const draftListEl = document.getElementById('draft-list');
  const postListEl = document.getElementById('post-list');
  const editorModeEl = document.getElementById('editor-mode');
  const editorHintEl = document.getElementById('editor-hint');
  let activeDraftId = '';
  let activePostSlug = '';
  let activePostDate = '';
  let activeStaticSlug = '';
  let staticPosts = [];
  let staticPostsLoaded = false;

  // ── 認証 ────────────────────────────────────────────────────
  const loginView  = document.getElementById('login-view');
  const adminPinEl = document.getElementById('admin-pin');
  const lockStatusEl = document.getElementById('lock-status');

  function showLock() {
    loginView.style.display = '';
    adminPinEl.focus();
  }

  const savedPin = readSavedPin();
  if (savedPin) {
    sessionStorage.setItem(SESSION_KEY, '1');
    sessionStorage.setItem(SESSION_PIN_KEY, savedPin);
  }

  if (sessionStorage.getItem(SESSION_KEY)) {
    document.body.classList.add('is-unlocked');
    loadDraftList();
    loadPostList();
  } else {
    showLock();
  }

  async function handleLogin() {
    const input = adminPinEl.value.trim();
    if (!/^\d{4}$/.test(input)) { lockStatusEl.textContent='数字4桁で入れて。'; adminPinEl.focus(); return; }
    lockStatusEl.textContent='確認中...';
    const ok = await validatePin(input);
    if (!ok) { lockStatusEl.textContent='パスワードが違う。'; adminPinEl.value=''; adminPinEl.focus(); return; }
    sessionStorage.setItem(SESSION_KEY, '1');
    sessionStorage.setItem(SESSION_PIN_KEY, input);
    savePinForThisBrowser(input);
    document.body.classList.add('is-unlocked');
    setTimeout(() => { loadDraftList(); loadPostList(); }, 200);
  }
  document.getElementById('unlock-admin').addEventListener('click', handleLogin);
  adminPinEl.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });

  document.getElementById('logout-admin').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(SESSION_PIN_KEY);
    localStorage.removeItem(SAVED_PIN_KEY);
    document.body.classList.remove('is-unlocked');
    adminPinEl.value='';
    lockStatusEl.textContent='ログアウトした。';
    showLock();
  });

  async function validatePin(pin) {
    try {
      const res = await fetch('/api/blog-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      const type = res.headers.get('content-type') || '';
      if (res.ok && type.includes('application/json')) return true;
      return false;
    } catch {
      return false;
    }
  }

  function currentPin() {
    return (sessionStorage.getItem(SESSION_PIN_KEY) || '').trim();
  }

  function savePinForThisBrowser(pin) {
    try {
      localStorage.setItem(SAVED_PIN_KEY, btoa(`pin:${pin}`));
    } catch (_) {}
  }

  function readSavedPin() {
    try {
      const raw = localStorage.getItem(SAVED_PIN_KEY) || '';
      const decoded = raw ? atob(raw) : '';
      const pin = decoded.startsWith('pin:') ? decoded.slice(4) : '';
      return /^\d{4}$/.test(pin) ? pin : '';
    } catch (_) {
      return '';
    }
  }

  // ── タイトル auto-resize ────────────────────────────────────
  titleEl.addEventListener('input', () => {
    titleEl.style.height = 'auto';
    titleEl.style.height = titleEl.scrollHeight + 'px';
    saveDraftLocal();
  });

  // ── ツールバー ────────────────────────────────────────────
  document.querySelectorAll('[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => { document.execCommand(btn.dataset.cmd, false, null); bodyEl.focus(); });
  });
  document.querySelectorAll('[data-color]').forEach(btn => {
    btn.addEventListener('click', () => { wrapSel('span', `color:${btn.dataset.color};font-weight:700;`); });
  });
  document.querySelectorAll('[data-align]').forEach(btn => {
    btn.addEventListener('click', () => { document.execCommand(`justify${cap(btn.dataset.align)}`, false, null); });
  });
  document.getElementById('format-select').addEventListener('change', e => {
    document.execCommand('formatBlock', false, e.target.value); e.target.value='P'; bodyEl.focus();
  });
  document.getElementById('text-color').addEventListener('input', e => wrapSel('span',`color:${e.target.value};font-weight:700;`));
  document.getElementById('bg-color').addEventListener('input', e => wrapSel('span',`background:${e.target.value};padding:0 .15em;border-radius:3px;`));
  document.getElementById('clear-style').addEventListener('click', () => document.execCommand('removeFormat', false, null));

  function cap(s) { return s[0].toUpperCase() + s.slice(1); }
  function wrapSel(tag, style) {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount || sel.getRangeAt(0).collapsed) return;
    const r = sel.getRangeAt(0);
    const el = document.createElement(tag);
    if (style) el.style.cssText = style;
    el.appendChild(r.extractContents());
    r.insertNode(el);
    sel.removeAllRanges();
  }

  async function uploadImage(file) {
    const pin = currentPin();
    if (!pin) return null;
    const webpFile = await convertToSingleWebp(file);
    if (!webpFile) return null;
    const fd = new FormData(); fd.append('file', webpFile);
    try {
      const res = await fetch('/api/blog-image', {
        method: 'POST',
        headers: { 'X-Yohelab-Pin': pin },
        body: fd,
      });
      const data = await res.json().catch(()=>({}));
      return res.ok ? { url: data.url, width: webpFile.convertedWidth, height: webpFile.convertedHeight } : null;
    } catch { return null; }
  }

  async function convertToSingleWebp(file) {
    if (!/^image\/(jpeg|png|webp)$/.test(file.type)) {
      statusEl.textContent = 'JPG / PNG / WebP の画像だけ使えます。';
      return null;
    }

    const bitmap = await createImageBitmap(file).catch(() => null);
    if (!bitmap) {
      statusEl.textContent = '画像を読み込めませんでした。';
      return null;
    }

    const maxSide = 1600;
    const scale = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
    const width = Math.max(1, Math.round(bitmap.width * scale));
    const height = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d', { alpha: true });
    ctx.drawImage(bitmap, 0, 0, width, height);
    bitmap.close?.();

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/webp', 0.82));
    if (!blob) {
      statusEl.textContent = 'WebPへの変換に失敗しました。';
      return null;
    }

    const baseName = (file.name || 'blog-image').replace(/\.[^.]+$/, '').replace(/[^\w-]+/g, '-').replace(/^-+|-+$/g, '') || 'blog-image';
    const converted = new File([blob], `${baseName}.webp`, { type: 'image/webp' });
    converted.convertedWidth = width;
    converted.convertedHeight = height;
    return converted;
  }

  function staticPostBySlug(slug) {
    return staticPosts.find(p => p.slug === slug) || null;
  }

  function compareByCategory(a, b) {
    const rank = (post) => {
      const tags = normalizeTagsForSort(post);
      const order = ['chatgpt','claude','gemini','perplexity','genspark','grok','copilot','midjourney','ai-news','wordpress','earn','template','home-work','article'];
      const found = order.findIndex(tag => tags.includes(tag));
      return found === -1 ? 999 : found;
    };
    return rank(a) - rank(b) || String(b.date || '').localeCompare(String(a.date || '')) || String(a.title || '').localeCompare(String(b.title || ''), 'ja');
  }

  function normalizeTagsForSort(post) {
    const raw = [...(post.tags || []), post.title || '', post.excerpt || ''].join(' ').toLowerCase();
    const tags = new Set(String(raw).split(/\s+|,|、/).filter(Boolean));
    if (raw.includes('chatgpt') || raw.includes('openai')) tags.add('chatgpt');
    if (raw.includes('claude') || raw.includes('anthropic')) tags.add('claude');
    if (raw.includes('gemini') || raw.includes('google')) tags.add('gemini');
    if (raw.includes('perplexity')) tags.add('perplexity');
    if (raw.includes('genspark')) tags.add('genspark');
    if (raw.includes('grok')) tags.add('grok');
    if (raw.includes('copilot') || raw.includes('microsoft')) tags.add('copilot');
    if (raw.includes('wordpress') || raw.includes('文標')) tags.add('wordpress');
    if (raw.includes('副業') || raw.includes('稼')) tags.add('earn');
    if (raw.includes('テンプレ') || raw.includes('比較記事')) tags.add('template');
    if (raw.includes('在宅') || raw.includes('家で作業')) tags.add('home-work');
    if (raw.includes('aiニュース') || raw.includes('ai検索')) tags.add('ai-news');
    return [...tags];
  }

  function openStaticPost(slug) {
    const post = staticPostBySlug(slug);
    if (!post) { statusEl.textContent = 'サイト内記事が見つかりません。'; return; }
    const title = String(post.title || '').replace(/^【下書き】\s*/, '');
    fillEditor({
      title,
      slug: post.slug,
      date: post.date || '',
      excerpt: post.excerpt || '',
      bodyHtml: post.bodyHtml || '',
      tags: post.tags || [],
      eyecatch: post.eyecatch || '',
    }, { staticSlug: slug });
    activeDraftId = '';
    activePostSlug = '';
    statusEl.textContent = 'サイト内記事を開いた ✓';
    setTimeout(() => statusEl.textContent='編集中', 2000);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function saveStaticPostAsDraft(slug, btn) {
    const post = staticPostBySlug(slug);
    const pin = currentPin();
    if (!post || !pin) return;
    btn.textContent = '保存中...';
    btn.disabled = true;
    const res = await fetch('/api/blog-draft', {
      method: 'POST',
      headers: { 'Content-Type':'application/json','X-Yohelab-Pin': pin },
      body: JSON.stringify({
        title: String(post.title || '').replace(/^【下書き】\s*/, ''),
        slug: post.slug,
        excerpt: post.excerpt || '',
        bodyHtml: post.bodyHtml || '',
        body: stripHtml(post.bodyHtml || ''),
        tags: post.tags || [],
        eyecatch: post.eyecatch || undefined,
      }),
    });
    if (res.ok) {
      btn.textContent = '保存済み';
      statusEl.textContent = 'サイト内記事を下書きに保存した ✓';
      loadDraftList();
      return;
    }
    btn.textContent = '失敗';
    btn.disabled = false;
  }

  async function openPost(slug) {
    if (!slug) return;
    statusEl.textContent = '公開済み記事を開いています...';
    const res = await fetch(`/api/blog-post-get?slug=${encodeURIComponent(slug)}`);
    const data = await res.json().catch(()=>({}));
    if (!res.ok || !data.post) {
      statusEl.textContent = data.error || '記事を開けませんでした。';
      return;
    }
    fillEditor(data.post, { postSlug: slug });
    statusEl.textContent = '公開済み記事を開いた ✓';
    setTimeout(() => statusEl.textContent='編集中', 2000);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function movePostToDraft(slug, btn) {
    if (!confirm('この記事を下書きに戻しますか？公開ページからは消えます。')) return;
    const pin = currentPin();
    if (!pin || !slug) return;
    btn.textContent = '処理中...';
    btn.disabled = true;
    const getRes = await fetch(`/api/blog-post-get?slug=${encodeURIComponent(slug)}`);
    const getData = await getRes.json().catch(()=>({}));
    if (!getRes.ok || !getData.post) {
      btn.textContent = '失敗';
      btn.disabled = false;
      return;
    }
    const draftRes = await fetch('/api/blog-draft', {
      method: 'POST',
      headers: { 'Content-Type':'application/json','X-Yohelab-Pin': pin },
      body: JSON.stringify(getData.post),
    });
    if (!draftRes.ok) {
      btn.textContent = '失敗';
      btn.disabled = false;
      return;
    }
    const delRes = await fetch('/api/blog-post', {
      method:'DELETE',
      headers:{'Content-Type':'application/json','X-Yohelab-Pin':pin},
      body: JSON.stringify({slug}),
    });
    if (!delRes.ok) {
      btn.textContent = '削除失敗';
      btn.disabled = false;
      return;
    }
    if (activePostSlug === slug) {
      activePostSlug = '';
      updateEditorState();
    }
    statusEl.textContent = '下書きに戻した ✓';
    loadDraftList();
    loadPostList();
  }

  async function deletePost(kvKey, btn) {
    if (!confirm('この記事を削除しますか？')) return;
    const pin = currentPin();
    if (!pin) return;
    const slug = kvKey.replace(/^post:/,'');
    btn.textContent='削除中...'; btn.disabled=true;
    const res = await fetch('/api/blog-post', {
      method:'DELETE',
      headers:{'Content-Type':'application/json','X-Yohelab-Pin':pin},
      body: JSON.stringify({slug}),
    });
    if (res.ok) {
      if (activePostSlug === slug) clearEditor();
      loadPostList();
    } else {
      btn.textContent='失敗'; btn.disabled=false;
    }
  }

  document.getElementById('refresh-posts').addEventListener('click', loadPostList);
  document.getElementById('refresh-drafts').addEventListener('click', loadDraftList);

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html || '';
    return tmp.innerText.trim();
  }

  Object.assign(window, {
    openDraft,
    deleteDraft,
    openPost,
    movePostToDraft,
    deletePost,
    openStaticPost,
    saveStaticPostAsDraft,
  });
  </script>
</body>
</html>
