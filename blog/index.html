<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="よへラボの公開ブログ。AI検索に引用されやすい記事の作り方、WordPressテーマの考え方、記事メーカーの使い方を書いていく。" />
  <meta property="og:title" content="よへラボブログ" />
  <meta property="og:description" content="AI検索・記事メーカー・WPテーマに関する公開ノート。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:url" content="https://yohelab.com/blog/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <link rel="canonical" href="https://yohelab.com/blog/" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <style>
    body { background:#f8fbf9; }

    .blog-hero {
      padding:72px 0 44px;
      background:linear-gradient(160deg,#07100e 0%,#0d1f19 100%);
      color:#fff;
    }
    .blog-hero h1 {
      font-size:clamp(36px,6vw,66px);line-height:1.06;
      letter-spacing:-.06em;margin-bottom:14px;
    }
    .blog-hero p {
      color:rgba(255,255,255,.68);font-size:17px;line-height:1.85;
      max-width:600px;
    }

    /* グリッド */
    .posts-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:8px;
    }

    /* カード */
    .post-card {
      background:#fff;border-radius:18px;
      border:1px solid var(--border);
      box-shadow:var(--shadow-xs);
      overflow:hidden;
      text-decoration:none;color:inherit;
      display:flex;flex-direction:column;
      transition:box-shadow .2s,transform .2s;
      cursor:pointer;
    }
    .post-card:hover {
      box-shadow:0 8px 32px rgba(0,0,0,.10);
      transform:translateY(-2px);
    }
    .post-card-img {
      width:100%;height:180px;object-fit:cover;display:block;
      background:#e8f4ef;
    }
    .post-card-img-placeholder {
      width:100%;height:130px;background:linear-gradient(135deg,#e8f4ef,#d0ecdf);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;color:rgba(0,0,0,.15);
    }
    .post-card-body { padding:18px 20px 20px;flex:1;display:flex;flex-direction:column; }
    .post-card-meta { font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
    .post-card-tag { background:#f0f8f4;color:#075c4c;border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700; }
    .post-card-title { font-size:17px;font-weight:800;line-height:1.4;margin-bottom:10px;letter-spacing:-.02em;flex:1; }
    .post-card-excerpt { font-size:13px;color:var(--muted);line-height:1.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .post-card-footer { margin-top:14px;font-size:12px;color:var(--green);font-weight:700; }

    .empty { padding:48px 24px;text-align:center;color:var(--muted);font-size:16px; }

    @media (max-width:960px) { .posts-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:560px) { .posts-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/"><img src="/yohelab-icon.png" alt="よへラボ" /><span>よへラボ</span></a>
      <nav class="nav-links">
        <a href="/">トップ</a>
        <a href="/apps/research-writer/">記事メーカー</a>
        <a href="/apps/wordpress-theme/">テーマ</a>
        <a href="/blog/" aria-current="page">ブログ</a>
      </nav>
    </div>
  </header>

  <section class="blog-hero">
    <div class="container">
      <p class="section-label" style="color:#6be5c9;border-color:rgba(107,229,201,.3);">Blog</p>
      <h1>AI検索の話を書く。</h1>
      <p>記事メーカーの話、WordPressテーマの考え方、AI検索に引用されやすい記事の作り方を置いていく。</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <p class="section-label">Latest</p>
      <h2 class="section-title">最新の記事</h2>
      <div id="posts" class="posts-grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / ブログ</div>
      <div class="footer-links">
        <a href="/apps/research-writer/">記事メーカー</a>
        <a href="/apps/wordpress-theme/">テーマ</a>
        <a href="/">トップ</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/blog/main.js"></script>
</body>
</html>
