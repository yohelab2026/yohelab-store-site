  <style>
    body { background:#f8fbf9; }

    .blog-intro {
      max-width:760px;
      margin:18px auto 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.85;
    }

    /* グリッド */
    .posts-grid {
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
      margin-top:16px;
      max-width:760px;
      margin-left:auto;
      margin-right:auto;
    }

    /* カード */
    .post-card {
      background:#fff;border-radius:22px;
      border:1px solid var(--border);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
      text-decoration:none;color:inherit;
      display:flex;flex-direction:column;
      transition:box-shadow .2s,transform .2s;
      cursor:pointer;
    }
    .post-card:hover {
      box-shadow:0 8px 32px rgba(0,0,0,.10);
      transform:translateY(-2px);
    }
    .post-card-head {
      padding:20px 20px 0;
    }
    .post-card-img {
      width:100%;height:240px;object-fit:cover;display:block;
      background:#e8f4ef;
    }
    .post-card-img-placeholder {
      width:100%;height:200px;background:linear-gradient(135deg,#e8f4ef,#d0ecdf);
      display:flex;align-items:center;justify-content:center;
      font-size:40px;color:rgba(0,0,0,.15);
    }
    .post-card-body { padding:18px 20px 20px;flex:1;display:flex;flex-direction:column; }
    .post-card-meta { font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
    .post-card-tag { background:#f0f8f4;color:#075c4c;border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700; }
    .post-card-title { font-size:24px;font-weight:900;line-height:1.35;margin-bottom:12px;letter-spacing:-.04em;flex:1; }
    .post-card-excerpt {
      font-size:15px;color:var(--muted);line-height:1.9;
      display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
    }
    .post-card-excerpt.is-open {
      display:block;
      -webkit-line-clamp:initial;
    }
    .post-card-preview {
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      background:#f7fbff;
      border:1px solid #dce7fb;
      color:var(--text);
      font-size:14px;
      line-height:1.85;
      display:none;
    }
    .post-card-preview.is-open { display:block; }
    .post-card-footer {
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .read-more {
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:var(--green);
      font-weight:800;
      font-size:13px;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
    }
    .read-more:hover { text-decoration:underline; }
    .open-link {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      text-decoration:none;
    }

    .empty { padding:48px 24px;text-align:center;color:var(--muted);font-size:16px; }

    @media (max-width:560px) {
      .post-card-title { font-size:21px; }
    }
  </style>
