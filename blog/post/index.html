<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブログ記事 | よへラボブログ</title>
  <meta name="description" content="よへラボブログの記事ページ。記事メーカー、WordPressテーマ、AI検索、商品ページ改善に関する制作背景と運用メモ。" />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://yohelab.com/blog/" />
  <link rel="icon" type="image/png" href="/yohelab-icon-32.png" />
  <link rel="stylesheet" href="/shared/site.min.css" />
  <style>
    body { background:#fff;color:var(--text); }

    /* カバー画像（フルワイド・ヒーロー） */
    .cover-hero {
      width:100%;overflow:hidden;
      background:#eef5ff;
    }
    .cover-hero img {
      width:100%;aspect-ratio:16/9;max-height:560px;object-fit:cover;display:block;
      animation:fadeIn .6s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ナビ */
    .nav { background:rgba(255,255,255,.88) !important; }

    /* 記事本体 */
    .post-outer { max-width:720px;margin:0 auto;padding:48px 24px 100px; }

    .post-meta {
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      font-size:13px;color:var(--muted);margin-bottom:20px;
    }
    .post-tag {
      background:#f0f8f4;color:var(--green-dark,#075c4c);
      border-radius:999px;padding:3px 12px;font-size:12px;font-weight:700;
    }

    .post-title {
      font-size:clamp(28px,5.5vw,52px);font-weight:900;
      letter-spacing:-.05em;line-height:1.12;
      margin-bottom:24px;color:var(--text);
    }

    .post-excerpt {
      font-size:19px;color:var(--muted);line-height:1.85;
      margin-bottom:40px;padding-bottom:32px;
      border-bottom:1px solid var(--border);
    }

    /* 本文 */
    .post-body { font-size:17px;line-height:2;color:var(--text); }
    .post-body h2 {
      font-size:clamp(20px,3.5vw,26px);font-weight:900;
      margin:44px 0 16px;letter-spacing:-.03em;
      padding-bottom:10px;border-bottom:2px solid var(--border);
    }
    .post-body h3 {
      font-size:clamp(17px,3vw,21px);font-weight:800;
      margin:32px 0 12px;
    }
    .post-body p { margin-bottom:20px; }
    .post-body ul,.post-body ol { padding-left:26px;margin-bottom:20px; }
    .post-body li { margin-bottom:8px;line-height:1.85; }
    .post-body blockquote {
      border-left:4px solid var(--green);
      padding:14px 20px;background:#f0f8f4;
      border-radius:0 12px 12px 0;margin:24px 0;
      color:var(--muted);font-size:16px;
    }
    .post-body img {
      max-width:100%;border-radius:12px;margin:24px 0;display:block;
    }
    .post-body a { color:var(--green);text-decoration:underline; }

    /* フッター */
    .post-footer {
      margin-top:56px;padding-top:28px;
      border-top:1px solid var(--border);
    }
    .post-footer-inner {
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    }
    .back-link {
      display:inline-flex;align-items:center;gap:6px;
      color:var(--muted);font-size:14px;font-weight:700;
      text-decoration:none;transition:color .2s;
    }
    .back-link:hover { color:var(--green); }
    .share-btn {
      display:inline-flex;align-items:center;gap:6px;
      background:#1d9bf0;color:#fff;border:none;border-radius:999px;
      padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;
      text-decoration:none;
    }

    /* 関連リンク */
    .related {
      margin-top:48px;padding:24px;
      background:#f6fbf8;border-radius:18px;
      border:1px solid var(--border);
    }
    .related p { font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px; }
    .related-links { display:flex;flex-wrap:wrap;gap:10px; }
    .related-links a {
      padding:8px 16px;background:#fff;border:1px solid var(--border);
      border-radius:999px;font-size:13px;font-weight:700;color:var(--text);
      text-decoration:none;transition:border-color .2s;
    }
    .related-links a:hover { border-color:var(--green);color:var(--green); }

    .not-found { text-align:center;padding:80px 24px;color:var(--muted);font-size:18px; }

    @media (max-width:600px) {
      .post-outer { padding:32px 18px 80px; }
      .cover-hero img { max-height:300px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/"><img src="/yohelab-icon.webp" alt="よへラボ" /><span>よへラボ</span></a>
      <nav class="nav-links">
        <a href="/lp/bunsirube/">文標</a>
        <a href="/lp/bunsirube/demo/">デモ</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <div id="cover-wrap"></div>

  <main>
    <div class="post-outer" id="post-outer">
      <div class="not-found" style="color:var(--muted);">読み込み中...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / yohelab.com</div>
      <div class="footer-links">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
        <a href="/legal/commerce/">特定商取引法</a>
        <a href="/legal/privacy/">プライバシー</a>
        <a href="/legal/terms/">利用規約</a>
      </div>
    </div>
  </footer>

  <script>
  const slug = new URLSearchParams(location.search).get('slug') || '';
  const fallbackPosts = [];

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function sanitizeBodyHtml(html) {
    return enhanceArticleImages(String(html || '')
      .replace(/<\s*(script|style|iframe|object|embed|form|input|button|select|textarea|meta|link|base|svg|math)\b[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi, '')
      .replace(/<\s*(script|style|iframe|object|embed|form|input|button|select|textarea|meta|link|base|svg|math)\b[^>]*\/?>/gi, '')
      .replace(/\son[a-z]+\s*=\s*"[^"]*"/gi, '')
      .replace(/\son[a-z]+\s*=\s*'[^']*'/gi, '')
      .replace(/\son[a-z]+\s*=\s*[^\s>]+/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*"[^"]*"/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*'[^']*'/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*[^\s>]+/gi, '')
      .replace(/(href|src)\s*=\s*(['"]?)\s*(javascript:|data:text\/html|vbscript:)[^'"\s>]*/gi, '$1="#"')
      .replace(/<\/script/gi, '<\\/script'));
  }

  function enhanceArticleImages(html) {
    const imageTagPattern = new RegExp('<' + 'img\\b([^>]*)>', 'gi');
    return html.replace(imageTagPattern, (match, attrs) => {
      let next = attrs;
      if (!/\salt\s*=/.test(next)) next += ' alt="記事内画像"';
      if (!/\sloading\s*=/.test(next)) next += ' loading="lazy"';
      if (!/\sdecoding\s*=/.test(next)) next += ' decoding="async"';
      if (!/\sstyle\s*=/.test(next)) next += ' style="max-width:100%;height:auto;border-radius:12px;margin:24px 0;display:block;"';
      return '<' + `img${next}>`;
    });
  }

  async function loadPost() {
    if (!slug) { showError('記事が見つかりません。'); return; }
    try {
      const res = await fetch(`/api/blog-post-get?slug=${encodeURIComponent(slug)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { post } = await res.json();
      render(post);
    } catch(e) {
      const post = fallbackPosts.find((item) => item.slug === slug);
      if (post) render(post);
      else showError('記事が見つかりません。');
    }
  }

  function render(post) {
    // メタタグ更新
    document.title = `${post.title || '記事'} | よへラボブログ`;
    setMeta('description', post.excerpt || post.title || '');
    setMeta('og:title', `${post.title} | よへラボブログ`);
    setMeta('og:description', post.excerpt || '');
    if (post.eyecatch) setMeta('og:image', post.eyecatch);

    // カバー画像（フルワイド）
    if (post.eyecatch) {
      document.getElementById('cover-wrap').innerHTML =
        `<div class="cover-hero"><img src="${esc(post.eyecatch)}" alt="${esc(post.title)}" /></div>`;
    }

    const tags = (post.tags||[]).map(t=>`<span class="post-tag">${esc(t)}</span>`).join('');
    const excerpt = post.excerpt ? `<p class="post-excerpt">${esc(post.excerpt)}</p>` : '';
    const bodyContent = post.bodyHtml ? sanitizeBodyHtml(post.bodyHtml) : (post.body||'').split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('');
    const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(location.href)}`;

    document.getElementById('post-outer').innerHTML = `
      <div class="post-meta">
        <span>${esc(post.date||'')}</span>
        ${tags}
      </div>
      <h1 class="post-title">${esc(post.title||'')}</h1>
      ${excerpt}
      <div class="post-body">${bodyContent}</div>
      <div class="post-footer">
        <div class="post-footer-inner">
          <a class="back-link" href="/blog/">← 記事一覧に戻る</a>
          <a class="share-btn" href="${twitterUrl}" target="_blank" rel="noreferrer">𝕏 シェア</a>
        </div>
      </div>
      <div class="related">
        <p>よへラボのツール</p>
        <div class="related-links">
          <a href="/lp/bunsirube/">文標（ぶんしるべ）</a>
          <a href="/lp/bunsirube/demo/">文標 デモ</a>
          <a href="/blog/">ブログ一覧</a>
        </div>
      </div>
    `;
  }

  function setMeta(name, content) {
    let el = document.querySelector(`meta[name="${name}"], meta[property="${name}"]`);
    if (!el) { el = document.createElement('meta'); el.setAttribute(name.includes(':') ? 'property' : 'name', name); document.head.appendChild(el); }
    el.setAttribute('content', content);
  }

  function showError(msg) {
    document.getElementById('post-outer').innerHTML = `
      <a class="back-link" href="/blog/" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:700;text-decoration:none;margin-bottom:32px;">← 記事一覧に戻る</a>
      <div class="not-found">${esc(msg)}</div>
    `;
  }

  loadPost();
  </script>
</body>
</html>
