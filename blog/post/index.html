<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブログ記事 | よへラボブログ</title>
  <meta name="description" content="よへラボブログの記事ページ。記事メーカー、WordPressテーマ、AI検索、商品ページ改善に関する制作背景と運用メモ。" />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://yohelab.com/blog/" />
  <link rel="icon" type="image/png" href="/yohelab-mascot-v2-20260518-32.png" />
  <link rel="stylesheet" href="/shared/site.min.css" />
  <style>
    body { background:#fff;color:var(--text); }

    /* カバー画像（フルワイド・ヒーロー） */
    .cover-hero {
      width:min(1180px, calc(100% - 32px));aspect-ratio:16/9;margin:24px auto 0;overflow:hidden;border-radius:24px;
      background:#eef5ff;
    }
    .cover-hero img {
      width:100%;height:100%;object-fit:cover;display:block;
      animation:fadeIn .6s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ナビ */
    .nav { background:rgba(255,255,255,.88) !important; }

    /* 記事本体 */
    .post-outer { max-width:720px;margin:0 auto;padding:48px 24px 100px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }

    .post-meta {
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      font-size:13px;color:var(--muted);margin-bottom:20px;
    }
    .post-tag { background:#f0f8f4;color:var(--green-dark,#075c4c);border-radius:999px;padding:3px 12px;font-size:12px;font-weight:700;text-decoration:none; }
    .post-tag:hover { background:#e0f4ec;color:var(--green); }

    .post-title {
      font-size:clamp(28px,5.5vw,52px);font-weight:900;
      letter-spacing:-.05em;line-height:1.12;
      margin-bottom:24px;color:var(--text);
    }

    /* 本文 */
    .post-body { font-size:17px;line-height:2;color:var(--text); }
    .post-body h2 {
      font-size:clamp(20px,3.5vw,26px);font-weight:900;
      margin:44px 0 16px;letter-spacing:-.03em;
      padding-bottom:10px;border-bottom:2px solid var(--border);
    }
    .post-body h3 {
      font-size:clamp(17px,3vw,21px);font-weight:800;
      margin:32px 0 12px;
    }
    .post-body p { margin-bottom:20px; }
    .post-body ul,.post-body ol { padding-left:26px;margin-bottom:20px; }
    .post-body li { margin-bottom:8px;line-height:1.85; }
    .post-body blockquote {
      border-left:4px solid var(--green);
      padding:14px 20px;background:#f0f8f4;
      border-radius:0 12px 12px 0;margin:24px 0;
      color:var(--muted);font-size:16px;
    }
    .post-body img {
      max-width:100%;border-radius:12px;margin:24px 0;display:block;
    }
    .post-body a { color:var(--green);text-decoration:underline; }
    .post-body .blog-link-card {
      display:grid;grid-template-columns:minmax(0,1fr) 148px;gap:16px;align-items:stretch;
      margin:28px 0;padding:16px;border:1px solid var(--border);border-radius:18px;background:#fff;
      color:var(--text);text-decoration:none;box-shadow:0 12px 30px rgba(14,55,42,.07);
    }
    .post-body .blog-link-card:hover { border-color:#bde7d7;background:#fbfffd; }
    .post-body .blog-link-card-main { min-width:0;display:grid;gap:7px;align-content:center; }
    .post-body .blog-link-card-site { color:var(--green);font-size:12px;font-weight:900;line-height:1.4; }
    .post-body .blog-link-card-title { color:var(--text);font-size:16px;font-weight:900;line-height:1.55; }
    .post-body .blog-link-card-desc { color:var(--muted);font-size:13px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .post-body .blog-link-card-url { color:#78908a;font-size:12px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .post-body .blog-link-card-thumb { border-radius:14px;overflow:hidden;background:#e8f7f1;min-height:104px;display:grid;place-items:center;color:var(--green);font-size:24px;font-weight:900; }
    .post-body .blog-link-card-thumb img { width:100%;height:100%;object-fit:cover;display:block;margin:0;border-radius:0; }

    /* フッター */
    .post-footer {
      margin-top:56px;padding-top:28px;
      border-top:1px solid var(--border);
    }
    .post-footer-inner {
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    }
    .back-link {
      display:inline-flex;align-items:center;gap:6px;
      color:var(--muted);font-size:14px;font-weight:700;
      text-decoration:none;transition:color .2s;
    }
    .back-link:hover { color:var(--green); }
    .share-btn {
      display:inline-flex;align-items:center;gap:6px;
      background:#1d9bf0;color:#fff;border:none;border-radius:999px;
      padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;
      text-decoration:none;
    }

    .not-found { text-align:center;padding:80px 24px;color:var(--muted);font-size:18px; }

    @media (max-width:600px) {
      .post-outer { padding:32px 18px 80px; }
      .post-body .blog-link-card { grid-template-columns:1fr; }
      .post-body .blog-link-card-thumb { min-height:150px; }
    }
  </style>
</head>
<body>

  <header class="site-header" style="background:#fff;border-bottom:3px solid #087a63;position:sticky;top:0;z-index:100;">
    <div class="header-inner" style="max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:20px;height:56px;">
      <a href="/" style="display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;color:#087a63;letter-spacing:-0.03em;flex-shrink:0;text-decoration:none;">
        <img src="/yohelab-mascot-v2-20260518-64.png" width="36" height="36" alt="よへラボ" decoding="async" style="width:36px;height:36px;border-radius:8px;" />
        よへラボ
      </a>
      <nav style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
        <a href="/blog/" style="padding:5px 11px;border-radius:4px;font-size:13px;font-weight:700;color:#444;text-decoration:none;">ブログ</a>
        <a href="/lp/bunsirube/" style="padding:5px 11px;border-radius:4px;font-size:13px;font-weight:700;color:#444;text-decoration:none;">文標</a>
        <a href="/about/" style="padding:5px 11px;border-radius:4px;font-size:13px;font-weight:700;color:#444;text-decoration:none;">サイトについて</a>
      </nav>
    </div>
  </header>
<div id="cover-wrap"></div>

  <main>
    <div class="post-outer" id="post-outer">
      <div class="not-found" style="color:var(--muted);">読み込み中...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / yohelab.com</div>
      <div class="footer-links">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
        <a href="/legal/commerce/">特定商取引法</a>
        <a href="/legal/privacy/">プライバシー</a>
        <a href="/legal/terms/">利用規約</a>
      </div>
    </div>
  </footer>

  <script>
  const SITE_ORIGIN = 'https://yohelab.com';
  const BLOG_NAME = 'よへラボブログ';
  const FALLBACK_IMAGE = `${SITE_ORIGIN}/yohelab-mascot-v2-20260518.png`;
  const SEO_TITLE_MAX_CHARS = 60;
  const slug = slugFromLocation();
  const fallbackPosts = [];
  const DEFAULT_CATEGORY_TREE = [
    { key: 'ai-news', label: 'AIニュース', children: [
      { key: 'ai-news', label: 'AIニュース' },
      { key: 'chatgpt', label: 'ChatGPT' },
      { key: 'claude', label: 'Claude' },
      { key: 'gemini', label: 'Gemini' },
      { key: 'perplexity', label: 'Perplexity' },
      { key: 'genspark', label: 'Genspark' },
      { key: 'grok', label: 'Grok' },
      { key: 'deepseek', label: 'DeepSeek' },
      { key: 'codex', label: 'Codex' },
      { key: 'cursor', label: 'Cursor' },
      { key: 'copilot', label: 'Copilot' },
      { key: 'midjourney', label: 'Midjourney' },
    ] },
    { key: 'ai-tools', label: 'AIツール', children: [
      { key: 'ai-tools', label: 'AIツール' },
      { key: 'bunsirube', label: '文標' },
      { key: 'wordpress', label: '文標・WordPress' },
      { key: 'template', label: '記事テンプレ' },
    ] },
  ];
  let categoryLabelMap = buildCategoryLabelMap(DEFAULT_CATEGORY_TREE);

  function slugFromLocation() {
    const querySlug = new URLSearchParams(location.search).get('slug');
    if (querySlug) return querySlug;
    const match = location.pathname.match(/^\/blog\/([^/]+)\/?$/);
    return match ? decodeURIComponent(match[1]) : '';
  }

  function postPath(value) {
    return `/blog/${encodeURIComponent(String(value || '').trim())}/`;
  }

  function postUrl(value) {
    return `${SITE_ORIGIN}${postPath(value)}`;
  }

  function absoluteUrl(value) {
    const raw = String(value || '').trim();
    if (!raw) return FALLBACK_IMAGE;
    if (/^https?:\/\//i.test(raw)) return raw;
    return raw.startsWith('/') ? `${SITE_ORIGIN}${raw}` : `${SITE_ORIGIN}/${raw}`;
  }

  function cardImageUrl(value) {
    const abs = absoluteUrl(value);
    try {
      const parsed = new URL(abs);
      if (parsed.hostname === 'images.yohelab.com' || parsed.hostname.endsWith('.r2.dev')) {
        const key = parsed.pathname.replace(/^\/+/, '');
        if (/^[\w.-]+\.webp$/i.test(key)) return `${SITE_ORIGIN}/blog-images/${encodeURIComponent(key)}`;
      }
      if (parsed.hostname === 'yohelab.com' && parsed.pathname === '/api/blog-image') {
        const key = parsed.searchParams.get('key') || '';
        if (/^[\w.-]+\.webp$/i.test(key)) return `${SITE_ORIGIN}/blog-images/${encodeURIComponent(key)}`;
      }
    } catch (_) {
      return abs;
    }
    return abs;
  }

  function socialImageUrl(post = {}) {
    return cardImageUrl(post.eyecatch || post.socialImage || FALLBACK_IMAGE);
  }

  function imageMimeForUrl(value) {
    const url = String(value || '').toLowerCase().split('?')[0];
    if (url.endsWith('.jpg') || url.endsWith('.jpeg')) return 'image/jpeg';
    if (url.endsWith('.png')) return 'image/png';
    return 'image/webp';
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function seoCharLength(value) {
    return Array.from(String(value || '')).length;
  }

  function cleanSeoTitle(value) {
    return String(value || '')
      .replace(/\s+/g, ' ')
      .replace(/^\s*(?:よへラボブログ|よへラボ記事一覧|よへラボ)\s*(?:[|｜\-–—:：]\s*)?/i, '')
      .replace(/\s*(?:[|｜\-–—:：]\s*)?(?:よへラボブログ|よへラボ記事一覧|よへラボ)\s*$/i, '')
      .trim();
  }

  function truncateSeoPart(value, maxChars) {
    const clean = String(value || '').replace(/\s+/g, ' ').trim();
    const chars = Array.from(clean);
    if (chars.length <= maxChars) return clean;
    return `${chars.slice(0, Math.max(1, maxChars - 1)).join('').replace(/[、。・|｜\-–—:：\s]+$/g, '')}…`;
  }

  function postSeoTitle(title) {
    const delimiter = ' | ';
    const main = cleanSeoTitle(title) || '記事';
    return `${BLOG_NAME}${delimiter}${truncateSeoPart(main, SEO_TITLE_MAX_CHARS - seoCharLength(BLOG_NAME) - seoCharLength(delimiter))}`;
  }

  function buildCategoryLabelMap(categories) {
    const map = new Map();
    const source = mergeDefaultCategoryTree(Array.isArray(categories) && categories.length ? categories : DEFAULT_CATEGORY_TREE);
    source.forEach(parent => {
      if (parent?.key && parent?.label) map.set(String(parent.key).toLowerCase(), String(parent.label));
      (Array.isArray(parent?.children) ? parent.children : []).forEach(child => {
        if (child?.key && child?.label) map.set(String(child.key).toLowerCase(), String(child.label));
      });
    });
    return map;
  }

  function mergeDefaultCategoryTree(value) {
    const source = Array.isArray(value) && value.length ? value : DEFAULT_CATEGORY_TREE;
    const parents = source.map(parent => ({
      ...parent,
      children: Array.isArray(parent?.children) ? parent.children.map(child => ({ ...child })) : [],
    }));

    DEFAULT_CATEGORY_TREE.forEach(defaultParent => {
      const defaultParentKey = String(defaultParent.key || '').trim().toLowerCase();
      const parent = parents.find(item => String(item?.key || '').trim().toLowerCase() === defaultParentKey);
      if (!parent) {
        parents.push({
          ...defaultParent,
          children: defaultParent.children.map(child => ({ ...child })),
        });
        return;
      }

      if (!Array.isArray(parent.children)) parent.children = [];
      const childKeys = new Set(parent.children.map(child => String(child?.key || '').trim().toLowerCase()).filter(Boolean));
      defaultParent.children.forEach(defaultChild => {
        const childKey = String(defaultChild.key || '').trim().toLowerCase();
        if (!childKeys.has(childKey)) parent.children.push({ ...defaultChild });
      });
    });

    return parents;
  }

  async function loadCategoryLabels() {
    try {
      const res = await fetch('/api/blog-categories', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (res.ok && Array.isArray(data.categories)) categoryLabelMap = buildCategoryLabelMap(data.categories);
    } catch (_) {}
  }

  function displayCategoryLabel(tag) {
    const raw = String(tag || '').trim();
    return categoryLabelMap.get(raw.toLowerCase()) || raw;
  }

  function formatPostDate(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const normalized = /^\d{4}-\d{2}-\d{2}$/.test(raw) ? `${raw}T00:00:00+09:00` : raw;
    const date = new Date(normalized);
    return Number.isNaN(date.getTime()) ? raw : date.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', timeZone:'Asia/Tokyo' });
  }

  function dateTimeAttr(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    const date = new Date(raw);
    return Number.isNaN(date.getTime()) ? raw : date.toISOString();
  }

  function dateOnly(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    const date = new Date(raw);
    if (Number.isNaN(date.getTime())) return '';
    const parts = new Intl.DateTimeFormat('ja-JP-u-ca-gregory', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      timeZone: 'Asia/Tokyo',
    }).formatToParts(date);
    const part = (type) => parts.find((item) => item.type === type)?.value || '';
    return [part('year'), part('month'), part('day')].filter(Boolean).join('-');
  }

  function visibleUpdatedAt(post = {}, publishedDate = '') {
    const updated = post.updatedAt || post.modifiedAt || '';
    if (!updated) return '';
    const publishedDay = dateOnly(publishedDate);
    const updatedDay = dateOnly(updated);
    return publishedDay && updatedDay && publishedDay !== updatedDay ? updated : '';
  }

  function clampNumber(value, min, max, fallback) {
    const number = Number(value);
    if (!Number.isFinite(number)) return fallback;
    return Math.min(max, Math.max(min, Math.round(number)));
  }

  function coverSettings(post) {
    const input = post?.cover && typeof post.cover === 'object' ? post.cover : {};
    return {
      fit: input.fit === 'contain' ? 'contain' : 'cover',
      x: clampNumber(input.x, 0, 100, 50),
      y: clampNumber(input.y, 0, 100, 50),
      zoom: clampNumber(input.zoom, 100, 160, 100),
    };
  }

  function coverStyle(post) {
    const cover = coverSettings(post);
    return [
      `object-fit:${cover.fit}`,
      `object-position:${cover.x}% ${cover.y}%`,
      `transform:scale(${cover.zoom / 100})`,
      `transform-origin:${cover.x}% ${cover.y}%`,
    ].join(';');
  }

  function sanitizeBodyHtml(html, post = {}) {
    return removeLeadingH1(enhanceArticleImages(String(html || '')
      .replace(/<\s*(script|style|iframe|object|embed|form|input|button|select|textarea|meta|link|base|svg|math)\b[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi, '')
      .replace(/<\s*(script|style|iframe|object|embed|form|input|button|select|textarea|meta|link|base|svg|math)\b[^>]*\/?>/gi, '')
      .replace(/\son[a-z]+\s*=\s*"[^"]*"/gi, '')
      .replace(/\son[a-z]+\s*=\s*'[^']*'/gi, '')
      .replace(/\son[a-z]+\s*=\s*[^\s>]+/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*"[^"]*"/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*'[^']*'/gi, '')
      .replace(/\s(srcdoc|formaction)\s*=\s*[^\s>]+/gi, '')
      .replace(/(href|src)\s*=\s*(['"]?)\s*(javascript:|data:text\/html|vbscript:)[^'"\s>]*/gi, '$1="#"')
      .replace(/<\/script/gi, '<\\/script'), post));
  }

  function removeLeadingH1(html) {
    return String(html || '').replace(/^\s*<h1\b[^>]*>[\s\S]*?<\/h1>\s*/i, '');
  }

  function imageAltText(post = {}, type = 'body') {
    const title = String(post.title || '').replace(/\s+/g, ' ').trim();
    if (title) return type === 'cover' ? `${title}のアイキャッチ画像` : `${title}の画像`;
    return type === 'cover' ? 'アイキャッチ画像' : '記事内画像';
  }

  function isGenericImageAlt(value) {
    const text = String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
    return !text || ['画像', '記事内画像', 'image', 'photo', 'picture'].includes(text);
  }

  function attrValue(attrs, name) {
    const match = String(attrs || '').match(new RegExp(`\\s${name}\\s*=\\s*(?:"([^"]*)"|'([^']*)'|([^\\s>]+))`, 'i'));
    return match ? (match[1] || match[2] || match[3] || '') : '';
  }

  function setAttr(attrs, name, value) {
    const pattern = new RegExp(`(\\s${name}\\s*=\\s*)(?:"[^"]*"|'[^']*'|[^\\s>]+)`, 'i');
    if (pattern.test(attrs)) return attrs.replace(pattern, `$1"${esc(value)}"`);
    return `${attrs} ${name}="${esc(value)}"`;
  }

  function enhanceArticleImages(html, post = {}) {
    const imageTagPattern = new RegExp('<' + 'img\\b([^>]*)>', 'gi');
    return html.replace(imageTagPattern, (match, attrs) => {
      let next = attrs;
      if (isGenericImageAlt(attrValue(next, 'alt'))) next = setAttr(next, 'alt', imageAltText(post));
      if (!/\sloading\s*=/.test(next)) next += ' loading="lazy"';
      if (!/\sdecoding\s*=/.test(next)) next += ' decoding="async"';
      if (!/\sstyle\s*=/.test(next)) next += ' style="max-width:100%;height:auto;border-radius:12px;margin:24px 0;display:block;"';
      return '<' + `img${next}>`;
    });
  }

  async function loadPost() {
    if (!slug) { showError('記事が見つかりません。'); return; }
    await loadCategoryLabels();
    try {
      const res = await fetch(`/api/blog-post-get?slug=${encodeURIComponent(slug)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { post } = await res.json();
      render(post);
    } catch(e) {
      const post = fallbackPosts.find((item) => item.slug === slug);
      if (post) render(post);
      else showError('記事が見つかりません。');
    }
  }

  function render(post) {
    const postSlug = slug || post.slug || '';
    const pageUrl = postUrl(postSlug);
    const pagePath = postPath(postSlug);
    const title = post.title || '記事';
    const seoTitle = postSeoTitle(title);
    const description = post.excerpt || title;
    const imageUrl = socialImageUrl(post);
    const date = post.date || new Date().toISOString().slice(0, 10);
    const updatedAt = visibleUpdatedAt(post, date);
    const publishedLabel = formatPostDate(date);
    const updatedLabel = formatPostDate(updatedAt);

    if (postSlug && location.pathname.replace(/\/+$/, '') === '/blog/post') {
      history.replaceState(null, '', pagePath);
    }

    document.title = seoTitle;
    setCanonical(pageUrl);
    setMeta('description', description);
    setMeta('robots', 'index,follow,max-image-preview:large,max-snippet:-1');
    setMeta('og:title', seoTitle);
    setMeta('og:description', description);
    setMeta('og:type', 'article');
    setMeta('og:site_name', 'よへラボ');
    setMeta('og:locale', 'ja_JP');
    setMeta('og:url', pageUrl);
    setMeta('og:image', imageUrl);
    setMeta('og:image:url', imageUrl);
    setMeta('og:image:secure_url', imageUrl);
    setMeta('og:image:type', imageMimeForUrl(imageUrl));
    setMeta('og:image:width', '1200');
    setMeta('og:image:height', '675');
    setMeta('og:image:alt', imageAltText(post, 'cover'));
    setMeta('article:published_time', `${date}T00:00:00+09:00`);
    if (updatedAt) setMeta('article:modified_time', dateTimeAttr(updatedAt));
    setMeta('article:author', `${SITE_ORIGIN}/about/`);
    setMeta('twitter:card', 'summary_large_image');
    setMeta('twitter:title', seoTitle);
    setMeta('twitter:description', description);
    setMeta('twitter:image', imageUrl);
    setMeta('twitter:image:src', imageUrl);
    setMeta('twitter:image:alt', imageAltText(post, 'cover'));
    const jsonLd = {
      '@context': 'https://schema.org',
      '@type': 'BlogPosting',
      headline: title,
      description,
      image: imageUrl,
      datePublished: date,
      author: { '@type': 'Organization', name: 'よへラボ', url: SITE_ORIGIN },
      publisher: {
        '@type': 'Organization',
        name: 'よへラボ',
        logo: { '@type': 'ImageObject', url: FALLBACK_IMAGE },
      },
      isPartOf: { '@type': 'Blog', name: 'よへラボブログ', url: `${SITE_ORIGIN}/blog/` },
      mainEntityOfPage: { '@type': 'WebPage', '@id': pageUrl },
      url: pageUrl,
      inLanguage: 'ja-JP',
    };
    if (updatedAt) jsonLd.dateModified = updatedAt;
    upsertJsonLd('post-jsonld', jsonLd);

    // カバー画像（フルワイド）
    if (post.eyecatch) {
      document.getElementById('cover-wrap').innerHTML =
        `<div class="cover-hero"><img src="${esc(post.eyecatch)}" alt="${esc(imageAltText(post, 'cover'))}" style="${esc(coverStyle(post))}" loading="eager" decoding="async" fetchpriority="high" /></div>`;
    }

    const seenLabels = new Set();
    const tags = (post.tags||[]).map(t => ({ raw: t, label: displayCategoryLabel(t) })).filter(item => {
      if (!item.label || seenLabels.has(item.label)) return false;
      seenLabels.add(item.label);
      return true;
    }).map(item=>`<a class="post-tag" href="/blog/?category=${encodeURIComponent(tagSlug(item.raw))}">${esc(item.label)}</a>`).join('');
    const bodyContent = post.bodyHtml ? sanitizeBodyHtml(post.bodyHtml, post) : (post.body||'').split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('');
    const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(pageUrl)}`;

    const postDateMeta = `
      <div class="post-meta" style="margin-top:-10px;">
        <time datetime="${esc(dateTimeAttr(date))}">投稿日 ${esc(publishedLabel)}</time>
        ${updatedAt && updatedLabel ? `<span>/</span><time datetime="${esc(dateTimeAttr(updatedAt))}">最終更新日 ${esc(updatedLabel)}</time>` : ''}
      </div>
    `;

    const titleBlock = post.eyecatch ? `
      <h1 class="sr-only">${esc(post.title||'')}</h1>
      <div class="post-meta">
        ${tags}
      </div>
      ${postDateMeta}
    ` : `
      <div class="post-meta">
        ${tags}
      </div>
      <h1 class="post-title">${esc(post.title||'')}</h1>
      ${postDateMeta}
    `;

    document.getElementById('post-outer').innerHTML = `
      ${titleBlock}
      <div class="post-body">${bodyContent}</div>
      <div class="post-footer">
        <div class="post-footer-inner">
          <a class="back-link" href="/">← トップページに戻る</a>
          <a class="share-btn" href="${twitterUrl}" target="_blank" rel="noreferrer">𝕏 シェア</a>
        </div>
      </div>
    `;
  }

  function setMeta(name, content) {
    let el = document.querySelector(`meta[name="${name}"], meta[property="${name}"]`);
    if (!el) {
      el = document.createElement('meta');
      el.setAttribute(/^(og|article):/.test(name) ? 'property' : 'name', name);
      document.head.appendChild(el);
    }
    el.setAttribute('content', content);
  }

  function setCanonical(href) {
    let el = document.querySelector('link[rel="canonical"]');
    if (!el) { el = document.createElement('link'); el.setAttribute('rel', 'canonical'); document.head.appendChild(el); }
    el.setAttribute('href', href);
  }

  function upsertJsonLd(id, data) {
    let el = document.getElementById(id);
    if (!el) {
      el = document.createElement('script');
      el.id = id;
      el.type = 'application/ld+json';
      document.head.appendChild(el);
    }
    el.textContent = JSON.stringify(data);
  }

  function tagSlug(value) {
    const raw = String(value || '').trim();
    const lower = raw.toLowerCase();
    const map = {
      'aiニュース': 'ai-news',
      'ai検索': 'ai-news',
      'faq': 'faq',
      'chatgpt': 'chatgpt',
      'claude': 'claude',
      'gemini': 'gemini',
      'perplexity': 'perplexity',
      'genspark': 'genspark',
      'grok': 'grok',
      'deepseek': 'deepseek',
      'codex': 'codex',
      'cursor': 'cursor',
      'copilot': 'copilot',
      'midjourney': 'midjourney',
      '販売ページ': 'ai-tools',
      '改善': 'ai-tools',
      'aiツール': 'ai-tools',
      'wordpress': 'wordpress',
      '文標': 'bunsirube',
      '更新履歴': 'wordpress',
      '記事テンプレ': 'template',
      'テンプレ': 'template',
      '比較記事': 'template',
      '記事の型': 'article',
    };
    return map[lower] || lower || raw;
  }

  function showError(msg) {
    document.getElementById('post-outer').innerHTML = `
      <a class="back-link" href="/" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:700;text-decoration:none;margin-bottom:32px;">← トップページに戻る</a>
      <div class="not-found">${esc(msg)}</div>
    `;
  }

  loadPost();
  </script>
</body>
</html>
