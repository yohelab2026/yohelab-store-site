<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>読み込み中... | よへラボブログ</title>
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <style>
    body { background: #f8fbf9; }
    .post-wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
    .post-eyecatch { border-radius: 18px; overflow: hidden; margin-bottom: 36px; }
    .post-eyecatch img { width: 100%; max-height: 420px; object-fit: cover; display: block; }
    .post-meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
    .post-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; font-size: 12px; color: var(--muted); }
    .post-title { font-size: clamp(28px, 5vw, 48px); font-weight: 900; letter-spacing: -.04em; line-height: 1.15; margin-bottom: 28px; color: var(--text); }
    .post-excerpt { font-size: 18px; color: var(--muted); line-height: 1.8; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .post-body { font-size: 17px; line-height: 1.95; color: var(--text); }
    .post-body h2 { font-size: 24px; font-weight: 900; margin: 36px 0 14px; letter-spacing: -.03em; }
    .post-body h3 { font-size: 20px; font-weight: 800; margin: 28px 0 10px; }
    .post-body p { margin-bottom: 18px; }
    .post-body ul, .post-body ol { padding-left: 24px; margin-bottom: 18px; }
    .post-body li { margin-bottom: 8px; line-height: 1.8; }
    .post-body blockquote { border-left: 4px solid var(--green); padding: 12px 18px; background: var(--bg); border-radius: 0 10px 10px 0; margin: 20px 0; color: var(--muted); }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; font-weight: 700; margin-bottom: 32px; text-decoration: none; }
    .back-link:hover { color: var(--green); }
    .not-found { text-align: center; padding: 80px 24px; color: var(--muted); }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/"><img src="/yohelab-icon.png" alt="よへラボのアイコン" /><span>よへラボ</span></a>
      <nav class="nav-links">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/apps/research-writer/">記事メーカー</a>
        <a href="/apps/wordpress-theme/">テーマ</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="post-wrap" id="post-wrap">
      <div class="not-found">読み込み中...</div>
    </div>
  </main>
  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / ブログ</div>
      <div class="footer-links">
        <a href="/blog/">記事一覧</a>
        <a href="/apps/research-writer/">記事メーカー</a>
      </div>
    </div>
  </footer>
  <script>
    const slug = new URLSearchParams(location.search).get('slug') || '';

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadPost() {
      if (!slug) { showError('記事が見つかりません。'); return; }
      try {
        const res = await fetch(`/api/blog-post-get?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) { showError('記事が見つかりません。'); return; }
        const { post } = await res.json();
        render(post);
      } catch (e) {
        showError('読み込みに失敗しました。');
      }
    }

    function render(post) {
      document.title = `${post.title || '記事'} | よへラボブログ`;

      const tags = (post.tags || []).map(t => `<span class="post-tag">${escHtml(t)}</span>`).join('');
      const eyecatch = post.eyecatch
        ? `<div class="post-eyecatch"><img src="${escHtml(post.eyecatch)}" alt="${escHtml(post.title)}" /></div>`
        : '';
      const excerpt = post.excerpt
        ? `<p class="post-excerpt">${escHtml(post.excerpt)}</p>`
        : '';

      // bodyHtml があればそのまま、なければ body テキストを改行変換
      const bodyContent = post.bodyHtml
        ? post.bodyHtml
        : (post.body || '').split('\n\n').map(p => `<p>${escHtml(p)}</p>`).join('');

      document.getElementById('post-wrap').innerHTML = `
        <a class="back-link" href="/blog/">← 記事一覧に戻る</a>
        ${eyecatch}
        <div class="post-meta">
          <span>${escHtml(post.date || '')}</span>
          ${tags}
        </div>
        <h1 class="post-title">${escHtml(post.title || '')}</h1>
        ${excerpt}
        <div class="post-body">${bodyContent}</div>
      `;
    }

    function showError(msg) {
      document.getElementById('post-wrap').innerHTML = `
        <a class="back-link" href="/blog/">← 記事一覧に戻る</a>
        <div class="not-found">${escHtml(msg)}</div>
      `;
    }

    loadPost();
  </script>
</body>
</html>
