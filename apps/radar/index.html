<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案件レーダー | よへラボ</title>
    <meta name="description" content="案件レーダーは、条件に合うクラウドソーシング案件を厳選して、応募文の下書きまで返す無料AIツール。登録不要・ブラウザで今すぐ使える。" />
    <meta property="og:title" content="案件レーダー | よへラボ" />
    <meta property="og:description" content="条件を入れると、応募しやすい案件候補と応募文の下書きがすぐ返る。無料・登録不要。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yohelab.com/apps/radar/" />
    <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="theme-color" content="#0d6b58" />
    <link rel="canonical" href="https://yohelab.com/apps/radar/" />
    <link rel="icon" type="image/png" href="/yohelab-icon.png" />
    <link rel="stylesheet" href="/shared/site.css" />
    <style>
      .app-layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 24px;
        padding: 32px 0 80px;
        align-items: start;
      }
      .app-panel {
        position: sticky;
        top: 88px;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: var(--shadow);
      }
      .app-panel h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
      .form-stack { display: grid; gap: 16px; }
      .app-results { display: grid; gap: 20px; }
      .result-item {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .result-head {
        padding: 20px 24px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .result-head h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
      .result-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .meta-pill {
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--white);
        border: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      .score-pill {
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--green-light);
        border: 1px solid var(--green-mid);
        font-size: 13px;
        font-weight: 700;
        color: var(--green);
      }
      .result-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .result-col {
        padding: 20px 24px;
      }
      .result-col + .result-col {
        border-left: 1px solid var(--border);
      }
      .result-col-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .result-col p { font-size: 15px; line-height: 1.75; color: var(--text); margin: 0; }
      .draft-box {
        font-size: 14px;
        line-height: 1.85;
        white-space: pre-wrap;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        margin-top: 10px;
        color: #2a3240;
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding: 6px 14px;
        border-radius: 8px;
        background: var(--white);
        border: 1px solid var(--border);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        color: var(--text);
        transition: background .14s;
      }
      .copy-btn:hover { background: var(--bg); }
      .app-intro {
        padding: 40px 0 0;
        text-align: center;
      }
      .app-intro h1 { font-size: clamp(28px,5vw,44px); margin-bottom: 12px; }
      .app-intro p { color: var(--muted); font-size: 17px; margin-bottom: 8px; }
      .app-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
      .app-chip {
        padding: 5px 14px;
        border-radius: 999px;
        background: var(--bg);
        border: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
      }
      .upsell-bar {
        padding: 28px 32px;
        border-radius: 20px;
        background: linear-gradient(135deg, #0d1a16, #0d2b24);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 32px;
      }
      .upsell-bar h3 { font-size: 18px; margin-bottom: 6px; color: #fff; }
      .upsell-bar p { font-size: 14px; color: rgba(255,255,255,.7); margin: 0; }
      @media (max-width: 900px) {
        .app-layout { grid-template-columns: 1fr; }
        .app-panel { position: static; }
        .result-body { grid-template-columns: 1fr; }
        .result-col + .result-col { border-left: none; border-top: 1px solid var(--border); }
      }
    </style>
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"SoftwareApplication","name":"案件レーダー","applicationCategory":"BusinessApplication","operatingSystem":"Web","url":"https://yohelab.com/apps/radar/","offers":{"@type":"Offer","price":"0","priceCurrency":"JPY"},"description":"条件に合う案件候補と提案文の下書きを返す、ひとりで稼ぐ人向けのWebツール。"}
    </script>
  </head>
  <body>

    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <img src="/yohelab-icon.png" alt="よへラボのアイコン" />
          <span>よへラボ</span>
        </a>
        <nav class="nav-links">
          <a href="/">トップ</a>
          <a href="/apps/proposal/">応募文アシスタント</a>
          <a href="/contact/">問い合わせ</a>
          <a class="btn btn-primary btn-sm" href="/products/radar-beta/">プロプランを見る</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">

        <div class="app-intro">
          <h1>案件レーダー</h1>
          <p>条件を入れると、今日見るべき案件候補と応募文の下書きが返る。</p>
          <div class="app-chips">
            <span class="app-chip">登録不要</span>
            <span class="app-chip">ブラウザで今すぐ使える</span>
            <span class="app-chip">入力内容は保存しない</span>
          </div>
        </div>

        <div class="app-layout">

          <!-- フォーム -->
          <div class="app-panel">
            <h2>条件を入れる</h2>
            <form class="form-stack" id="radar-form">
              <label>欲しい案件のキーワード
                <input id="keyword" value="Webサイト LP ライティング" placeholder="例: ライティング, LP制作, EC改善" />
              </label>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <label>最低予算（円）
                  <input id="minBudget" type="number" value="30000" placeholder="30000" />
                </label>
                <label>得意分野
                  <select id="specialty">
                    <option value="writing">ライティング</option>
                    <option value="design">デザイン</option>
                    <option value="marketing">集客・マーケ</option>
                    <option value="ai">AI活用</option>
                  </select>
                </label>
              </div>
              <label>外したい条件
                <input id="exclude" value="女性限定, 出社必須, 動画編集" placeholder="例: 出社必須, 動画編集, 低単価" />
              </label>
              <label>自分の強み
                <textarea id="strengths" placeholder="例: 返信が早い。納期厳守。LP構成が得意。">返信が早い。初稿が早い。個人事業主向けの文章が得意。相手の依頼内容を整理して進めるのが得意。</textarea>
              </label>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                <button class="chip-action" type="button" data-chip="返信が早い。">返信が早い</button>
                <button class="chip-action" type="button" data-chip="納期厳守。">納期厳守</button>
                <button class="chip-action" type="button" data-chip="ヒアリングが得意。">ヒアリング得意</button>
                <button class="chip-action" type="button" data-chip="LP構成が得意。">LP構成得意</button>
              </div>
              <button class="btn btn-primary" style="width:100%;height:50px;" type="submit">案件を絞る</button>
              <p style="font-size:12px;color:var(--muted);text-align:center;">入力内容はサーバーに保存しません</p>
            </form>
          </div>

          <!-- 結果 -->
          <div class="app-results" id="results"></div>

        </div>

        <div class="upsell-bar">
          <div>
            <h3>毎朝の案件探しを、ルーティンにする</h3>
            <p>プロプランでは条件保存・候補整理・応募文の複数案まで。毎日使える形に整えられる。</p>
          </div>
          <a class="btn btn-white" href="/products/radar-beta/">プロプランを見る →</a>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>© よへラボ / 案件レーダー</div>
        <div class="footer-links">
          <a href="/">トップ</a>
          <a href="/contact/">問い合わせ</a>
          <a href="/legal/privacy/">プライバシーポリシー</a>
          <a href="/legal/terms/">利用規約</a>
        </div>
      </div>
    </footer>

    <div class="toast" id="copy-toast">コピーしました</div>

    <script>
      const copyToast = document.getElementById("copy-toast");

      function friendlyError(msg) {
        if (!msg) return "予期しないエラーが発生しました。もう一度お試しください。";
        const s = String(msg);
        if (/503|overloaded|over_loaded|unavailable/i.test(s)) return "AIサーバーが混み合っています。少し待ってからもう一度お試しください。";
        if (/429|quota|rate.?limit/i.test(s)) return "利用が集中しています。1〜2分後にもう一度お試しください。";
        if (/network|fetch|CORS/i.test(s)) return "通信エラーが発生しました。インターネット接続を確認してもう一度お試しください。";
        if (/timeout|timed.?out/i.test(s)) return "AIの応答がタイムアウトしました。もう一度お試しください。";
        if (/解析/i.test(s)) return s;
        return "エラーが発生しました。もう一度お試しください。";
      }

      function parseJobs(text) {
        try { return JSON.parse(text); } catch {}
        const match = text.match(/\[[\s\S]*\]/);
        if (match) {
          try { return JSON.parse(match[0]); } catch {}
        }
        throw new Error("案件データの解析に失敗しました。もう一度お試しください。");
      }

      function escapeHtml(str) {
        return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function render(list) {
        const results = document.getElementById("results");
        if (!list.length) {
          results.innerHTML = `<div class="empty" style="min-height:200px;display:grid;place-items:center;border:1.5px dashed var(--border);border-radius:16px;color:var(--muted);font-size:15px;">条件に近い案件が見つかりませんでした。<br>キーワードか最低予算を少しゆるめてみてください。</div>`;
          return;
        }

        results.innerHTML = list.map((job, i) => `
          <div class="result-item">
            <div class="result-head">
              <h3>${escapeHtml(job.title)}</h3>
              <div class="result-meta">
                <span class="score-pill">応募しやすさ ${Number(job.score) || 0} / 100</span>
                <span class="meta-pill">予算 ${Number(job.budget).toLocaleString()}円</span>
                <span class="meta-pill">${job.remote ? "リモート可" : "出社あり"}</span>
                ${(job.tags || []).map(t => `<span class="meta-pill">${escapeHtml(t)}</span>`).join("")}
              </div>
            </div>
            <div class="result-body">
              <div class="result-col">
                <div class="result-col-label">おすすめ理由</div>
                <p>${escapeHtml(job.reason)}</p>
                <div style="margin-top:12px;">
                  <div class="result-col-label">案件概要</div>
                  <p>${escapeHtml(job.summary)}</p>
                </div>
              </div>
              <div class="result-col">
                <div class="result-col-label">応募文の下書き（AI生成）</div>
                <div class="draft-box" id="draft-${i}">${escapeHtml(job.proposal)}</div>
                <button class="copy-btn" data-target="draft-${i}">コピー</button>
              </div>
            </div>
          </div>`).join("");

        results.querySelectorAll(".copy-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const box = document.getElementById(btn.dataset.target);
            await navigator.clipboard.writeText(box.textContent);
            copyToast.classList.add("show");
            copyToast.hidden = false;
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
              copyToast.classList.remove("show");
              copyToast.hidden = true;
            }, 1600);
          });
        });
      }

      document.querySelectorAll(".chip-action").forEach(btn => {
        btn.addEventListener("click", () => {
          const ta = document.getElementById("strengths");
          if (!ta.value.includes(btn.dataset.chip)) {
            ta.value = `${ta.value.trim()} ${btn.dataset.chip}`.trim();
          }
          ta.focus();
        });
      });

      document.getElementById("radar-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const results = document.getElementById("results");
        const submitBtn = e.target.querySelector('[type="submit"]');
        const specialtyEl = document.getElementById("specialty");

        submitBtn.disabled = true;
        submitBtn.textContent = "AIが案件を探しています…";
        results.innerHTML = `<div class="empty" style="min-height:200px;display:grid;place-items:center;border:1.5px dashed var(--border);border-radius:16px;color:var(--muted);font-size:15px;"><div style="text-align:center;">AIが条件に合う案件を探しています…<br><small>10〜20秒ほどかかります</small></div></div>`;

        try {
          const res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tool: "radar",
              data: {
                keyword: document.getElementById("keyword").value.trim(),
                minBudget: document.getElementById("minBudget").value || "30000",
                specialty: specialtyEl.options[specialtyEl.selectedIndex].text,
                exclude: document.getElementById("exclude").value.trim(),
                strengths: document.getElementById("strengths").value.trim(),
              }
            }),
          });
          const json = await res.json();
          if (json.error) throw new Error(json.error);
          const jobs = parseJobs(json.result);
          render(jobs);
        } catch (err) {
          results.innerHTML = `<div class="empty" style="min-height:200px;display:grid;place-items:center;border:1.5px dashed var(--border);border-radius:16px;color:var(--muted);font-size:15px;"><div style="text-align:center;">${escapeHtml(friendlyError(err.message))}</div></div>`;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "案件を絞る";
        }
      });
    </script>
  </body>
</html>
