<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案件レーダー | よへラボ</title>
    <link rel="icon" type="image/png" href="../../yohelab-icon.png" />
    <link rel="stylesheet" href="../../shared/site.css" />
  </head>
  <body>
    <header class="shell topbar">
      <a class="brand" href="../../index.html">
        <img src="../../yohelab-icon.png" alt="よへラボのアイコン" />
        <span>よへラボ</span>
      </a>
      <nav class="mini-nav">
        <a href="../../index.html">トップへ戻る</a>
        <a href="../proposal/index.html">応募文ジェネレーター</a>
      </nav>
    </header>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">案件を探す</div>
        <h1>今日応募しやすい案件を先に見る。</h1>
        <p class="lead">条件に合う案件だけを絞って、応募しやすい順に並べる。ついでに提案文の下書きまで返すミニ版。</p>
      </section>
      <section class="grid">
        <form class="panel stack" id="radar-form">
          <h2>条件を入れる</h2>
          <label>欲しい案件のキーワード<input id="keyword" value="Webサイト LP ライティング" /></label>
          <div class="row">
            <label>最低予算<input id="minBudget" type="number" value="30000" /></label>
            <label>得意分野
              <select id="specialty">
                <option value="writing">ライティング</option>
                <option value="design">デザイン</option>
                <option value="marketing">集客</option>
                <option value="ai">AI活用</option>
              </select>
            </label>
          </div>
          <label>外したい条件<input id="exclude" value="女性限定, 出社必須, 動画編集" /></label>
          <label>自分の強み<textarea id="strengths">返信が早い。初稿が早い。個人事業主向けの文章が得意。相手の依頼内容を整理して進めるのが得意。</textarea></label>
          <button class="button primary" type="submit">案件を絞る</button>
        </form>
        <div class="results" id="results"></div>
      </section>
    </main>
    <footer class="shell footer">よへラボ / 案件レーダー</footer>
    <script>
      const jobs = [
        { title: "LP文章の構成と執筆", budget: 80000, remote: true, tags: ["ライティング", "LP", "集客"], summary: "個人コーチ向けのLP。構成から相談したい。", urgency: 4 },
        { title: "自社ブログ記事10本の下書き", budget: 35000, remote: true, tags: ["ライティング", "SEO", "ブログ"], summary: "AI下書きあり。人間の整えが必要。", urgency: 3 },
        { title: "STORES商品ページ改善", budget: 50000, remote: true, tags: ["EC", "説明文", "Q&A"], summary: "商品説明とFAQを整えたい。", urgency: 5 },
        { title: "YouTube台本制作", budget: 25000, remote: true, tags: ["動画", "台本"], summary: "ショート動画台本を毎週5本。", urgency: 2 },
        { title: "店舗向けGoogle口コミ返信代行", budget: 42000, remote: true, tags: ["口コミ", "MEO", "返信"], summary: "10店舗分の返信方針を整えたい。", urgency: 4 },
        { title: "出社ありの営業事務", budget: 50000, remote: false, tags: ["事務", "出社"], summary: "平日常駐。", urgency: 1 },
        { title: "AI記事リライトと監修", budget: 70000, remote: true, tags: ["AI", "ライティング", "監修"], summary: "AI生成記事の人間監修。", urgency: 5 },
        { title: "女性限定モニター募集ページ作成", budget: 45000, remote: true, tags: ["LP", "女性限定"], summary: "特定ターゲット向けページ。", urgency: 2 }
      ];

      const results = document.getElementById("results");
      function proposalFor(job, strengths) {
        return `はじめまして。${job.title}を拝見し、内容の整理から一緒に進められると思い応募しました。\n\n${strengths.split("。").filter(Boolean).slice(0, 2).join("。")}。\n\n特に「${job.summary}」のように、依頼内容を言語化しながら進める案件が得意です。初稿までの流れを早めに共有し、修正の往復を減らせるよう動きます。`;
      }

      function render(list, strengths) {
        if (!list.length) {
          results.innerHTML = '<div class="empty">条件に近い案件が見つからなかった。キーワードや除外条件を少しゆるめると出やすい。</div>';
          return;
        }
        results.innerHTML = list.map((job) => `
          <article class="result-card">
            <div class="chip-row">
              <span class="chip">案件レーダー候補</span>
              <span class="chip">${job.score}点</span>
            </div>
            <h3>${job.title}</h3>
            <p class="muted">${job.summary}</p>
            <div class="meta-row">
              <span class="meta">予算 ${job.budget.toLocaleString()}円</span>
              <span class="meta">${job.remote ? "リモート可" : "出社あり"}</span>
              <span class="meta">${job.tags.join(" / ")}</span>
            </div>
            <div class="subgrid" style="margin-top:16px;">
              <div class="info-card">
                <h2>おすすめ理由</h2>
                <p>${job.reason}</p>
              </div>
              <div class="info-card">
                <h2>提案文の下書き</h2>
                <div class="output-box">${proposalFor(job, strengths)}</div>
              </div>
            </div>
          </article>
        `).join("");
      }

      document.getElementById("radar-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const keyword = document.getElementById("keyword").value.trim().toLowerCase();
        const minBudget = Number(document.getElementById("minBudget").value || 0);
        const specialty = document.getElementById("specialty").value;
        const exclude = document.getElementById("exclude").value.split(",").map((item) => item.trim()).filter(Boolean);
        const strengths = document.getElementById("strengths").value.trim();

        const ranked = jobs
          .filter((job) => job.budget >= minBudget)
          .filter((job) => !exclude.some((word) => `${job.title} ${job.summary} ${job.tags.join(" ")}`.includes(word)))
          .map((job) => {
            let score = job.budget / 1000 + job.urgency * 5 + (job.remote ? 12 : -8);
            const hay = `${job.title} ${job.summary} ${job.tags.join(" ")}`.toLowerCase();
            if (keyword && keyword.split(" ").some((word) => word && hay.includes(word))) score += 18;
            if (specialty === "writing" && job.tags.some((tag) => ["ライティング", "LP", "SEO", "ブログ"].includes(tag))) score += 10;
            if (specialty === "design" && job.tags.some((tag) => ["LP", "デザイン"].includes(tag))) score += 10;
            if (specialty === "marketing" && job.tags.some((tag) => ["集客", "MEO", "EC"].includes(tag))) score += 10;
            if (specialty === "ai" && job.tags.some((tag) => ["AI", "監修"].includes(tag))) score += 10;
            return {
              ...job,
              score: Math.round(score),
              reason: `${job.remote ? "リモートで進めやすく" : "条件は少し重いが"}、予算と緊急度のバランスが良い。${specialty === "writing" ? "文章系の強み" : specialty === "marketing" ? "集客寄りの強み" : specialty === "ai" ? "AI活用の強み" : "希望条件"}ともつながりやすい。`
            };
          })
          .sort((a, b) => b.score - a.score)
          .slice(0, 5);

        render(ranked, strengths);
      });

      document.getElementById("radar-form").dispatchEvent(new Event("submit"));
    </script>
  </body>
</html>
