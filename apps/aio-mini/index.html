<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIOミニ診断（無料版） | よへラボ</title>
    <meta name="description" content="自分のサイト・ブログ・ポートフォリオが検索で見つかりやすいかを4点で即診断。無料・登録不要。" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0d6b58" />
    <link rel="canonical" href="https://yohelab.com/apps/aio-mini/" />
    <link rel="icon" type="image/png" href="/yohelab-icon.png" />
    <link rel="stylesheet" href="/shared/site.css" />
    <style>
      .app-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; padding: 32px 0 80px; align-items: start; }
      .app-panel { position: sticky; top: 88px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .app-panel h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
      .form-stack { display: grid; gap: 16px; }
      .output-grid { display: grid; gap: 20px; }
      .output-area { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .output-area h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; }
      .score-big { font-size: 64px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
      .score-big.good { color: var(--green); }
      .score-big.warn { color: #b45309; }
      .draft-box { font-size: 14px; line-height: 1.9; white-space: pre-wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; color: #2a3240; }
      .app-intro { padding: 40px 0 0; text-align: center; }
      .app-intro h1 { font-size: clamp(24px,5vw,38px); margin-bottom: 12px; }
      .app-intro p { color: var(--muted); font-size: 17px; margin-bottom: 8px; }
      .app-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
      .app-chip { padding: 5px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; color: var(--muted); font-weight: 600; }
      .upsell-bar { padding: 28px 32px; border-radius: 20px; background: linear-gradient(135deg,#0d1a16,#0d2b24); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-top: 32px; }
      .upsell-bar h3 { font-size: 18px; margin-bottom: 6px; color: #fff; }
      .upsell-bar p { font-size: 14px; color: rgba(255,255,255,.7); margin: 0; }
      @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } .app-panel { position: static; } }
    </style>
  </head>
  <body>

    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <img src="/yohelab-icon.png" alt="よへラボのアイコン" />
          <span>よへラボ</span>
        </a>
        <nav class="nav-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a class="btn btn-primary btn-sm" href="/products/aio-mini-beta/">β版に申し込む</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">

        <div class="app-intro">
          <h1>AIOミニ診断 <span style="font-size:.55em;font-weight:500;color:var(--muted);letter-spacing:0;">無料版</span></h1>
          <p>自分のサイト・ブログが見つかりやすいかを、4項目でざっくり診断する。</p>
          <div class="app-chips">
            <span class="app-chip">登録不要</span>
            <span class="app-chip">URL取得なし</span>
            <span class="app-chip">ブログ・note・ポートフォリオ向け</span>
          </div>
        </div>

        <div class="app-layout">

          <div class="app-panel">
            <h2>ページ情報を入れる</h2>
            <form class="form-stack" id="aio-form">
              <label>ページURL
                <input id="url" value="https://example.com/my-service" placeholder="https://..." />
              </label>
              <label>何を提供しているか
                <textarea id="summary">個人向けに応募文や発信を助けるツールをまとめている。</textarea>
              </label>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <label>FAQがある
                  <select id="faq">
                    <option value="1">ある</option>
                    <option value="0">ない</option>
                  </select>
                </label>
                <label>比較表がある
                  <select id="compare">
                    <option value="0">ない</option>
                    <option value="1">ある</option>
                  </select>
                </label>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <label>実例・数字がある
                  <select id="proof">
                    <option value="0">ない</option>
                    <option value="1">少しある</option>
                    <option value="2">十分ある</option>
                  </select>
                </label>
                <label>プロフィールが明確
                  <select id="profile">
                    <option value="1">明確</option>
                    <option value="0">弱い</option>
                  </select>
                </label>
              </div>
              <button class="btn btn-primary" style="width:100%;height:50px;" type="submit">診断する</button>
              <p style="font-size:12px;color:var(--muted);text-align:center;">URL内容の外部取得はしません</p>
            </form>
          </div>

          <div class="output-grid">
            <div class="output-area">
              <h3>診断スコア</h3>
              <div class="score-big" id="score"></div>
              <p style="color:var(--muted);font-size:15px;margin-top:10px;" id="summary-output"></p>
            </div>
            <div class="output-area">
              <h3>改善ポイント</h3>
              <div class="draft-box" id="advice-output"></div>
            </div>
          </div>

        </div>

        <div class="upsell-bar">
          <div>
            <h3>見つかりやすいページに、まとめて整えたい</h3>
            <p>β版では改善項目の整理・見出し叩き台・FAQ生成まで。サイト全体を底上げできる。</p>
          </div>
          <a class="btn btn-white" href="/products/aio-mini-beta/">β版に申し込む →</a>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>© よへラボ / AIOミニ診断</div>
        <div class="footer-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a href="/legal/privacy/">プライバシーポリシー</a>
        </div>
      </div>
    </footer>

    <script>
      function renderAIO() {
        const faq = Number(document.getElementById("faq").value);
        const compare = Number(document.getElementById("compare").value);
        const proof = Number(document.getElementById("proof").value);
        const profile = Number(document.getElementById("profile").value);
        const url = document.getElementById("url").value.trim();
        const summary = document.getElementById("summary").value.trim();
        const score = 42 + faq * 16 + compare * 16 + proof * 13 + profile * 13;
        const el = document.getElementById("score");
        el.textContent = `${score} / 100`;
        el.className = `score-big ${score >= 75 ? "good" : "warn"}`;
        document.getElementById("summary-output").textContent = `${url} — FAQ・比較・実例・プロフィールの4点から見た簡易診断。${summary}`;
        const advice = [];
        if (!faq) advice.push("FAQがない。よく聞かれる質問を3〜5個入れると、検索意図と一致しやすくなる。");
        if (!compare) advice.push("比較表がない。誰向きか・何が違うか・何から始めるかを並べると理解されやすい。");
        if (!proof) advice.push("実例や数字が弱い。使う前後・作業時間・件数・変化などを短く添えると信頼感が出る。");
        if (!profile) advice.push("プロフィールが弱い。誰が作っているか・誰向けか・なぜ作ったかを明確にする。");
        if (!advice.length) advice.push("大きな穴は少ない。次は見出しの分かりやすさと事例の追加を詰める段階。");
        document.getElementById("advice-output").textContent = advice.join("\n\n");
      }
      document.getElementById("aio-form").addEventListener("submit", e => { e.preventDefault(); renderAIO(); });
      renderAIO();
    </script>
  </body>
</html>
