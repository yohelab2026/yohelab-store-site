<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EC商品説明・Q&amp;A整備 | よへラボ</title>
    <meta name="description" content="商品名・特徴・よくある不安を入れると、商品説明とQ&Aの叩き台をすぐ返す。BASE・STORES向け無料ツール。" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0d6b58" />
    <link rel="canonical" href="https://yohelab.com/apps/ec-copy/" />
    <link rel="icon" type="image/png" href="/yohelab-icon.png" />
    <link rel="stylesheet" href="/shared/site.css" />
    <style>
      .app-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; padding: 32px 0 80px; align-items: start; }
      .app-panel { position: sticky; top: 88px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .app-panel h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
      .form-stack { display: grid; gap: 16px; }
      .output-grid { display: grid; gap: 20px; }
      .output-area { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .output-area h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; }
      .draft-box { font-size: 14px; line-height: 1.9; white-space: pre-wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; color: #2a3240; }
      .app-intro { padding: 40px 0 0; text-align: center; }
      .app-intro h1 { font-size: clamp(24px,5vw,38px); margin-bottom: 12px; }
      .app-intro p { color: var(--muted); font-size: 17px; margin-bottom: 8px; }
      .app-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
      .app-chip { padding: 5px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; color: var(--muted); font-weight: 600; }
      .upsell-bar { padding: 28px 32px; border-radius: 20px; background: linear-gradient(135deg,#0d1a16,#0d2b24); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-top: 32px; }
      .upsell-bar h3 { font-size: 18px; margin-bottom: 6px; color: #fff; }
      .upsell-bar p { font-size: 14px; color: rgba(255,255,255,.7); margin: 0; }
      @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } .app-panel { position: static; } }
    </style>
  </head>
  <body>

    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <img src="/yohelab-icon.png" alt="よへラボのアイコン" />
          <span>よへラボ</span>
        </a>
        <nav class="nav-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a class="btn btn-primary btn-sm" href="/products/ec-copy-beta/">プロプランを見る</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">

        <div class="app-intro">
          <h1>EC商品説明・Q&amp;A整備</h1>
          <p>商品情報を入れると、商品説明文とQ&amp;Aの叩き台がすぐ返る。BASE・STORESで使える。</p>
          <div class="app-chips">
            <span class="app-chip">登録不要</span>
            <span class="app-chip">ブラウザで今すぐ使える</span>
            <span class="app-chip">個人ショップ・ハンドメイド向け</span>
          </div>
        </div>

        <div class="app-layout">

          <div class="app-panel">
            <h2>商品情報を入れる</h2>
            <form class="form-stack" id="ec-form">
              <label>商品名
                <input id="ec-name" value="やわらかリネンのエプロン" placeholder="例: ハンドメイドポーチ、天然石ブレスレット" />
              </label>
              <label>誰向けか
                <input id="audience" value="料理をするときも気分よく過ごしたい人" placeholder="例: 料理好きな方、ギフトを探している方" />
              </label>
              <label>特徴・こだわり
                <textarea id="features">軽い。肩がこりにくい。洗っても乾きやすい。見えても生活感が出にくい。</textarea>
              </label>
              <label>よくある不安・質問
                <textarea id="concerns">透けないか。洗濯しやすいか。プレゼントに向くか。</textarea>
              </label>
              <button class="btn btn-primary" style="width:100%;height:50px;" type="submit">説明文を作る</button>
              <p style="font-size:12px;color:var(--muted);text-align:center;">入力内容はサーバーに保存しません</p>
            </form>
          </div>

          <div class="output-grid">
            <div class="output-area">
              <h3>商品説明文</h3>
              <div class="draft-box" id="desc-output"></div>
            </div>
            <div class="output-area">
              <h3>Q&amp;A</h3>
              <div class="draft-box" id="faq-output"></div>
            </div>
          </div>

        </div>

        <div class="upsell-bar">
          <div>
            <h3>商品ページをまとめて整えたい</h3>
            <p>プロプランでは複数トーン・売り方違い・ページ別の整形まで。商品数が多いほど効果が出やすい。</p>
          </div>
          <a class="btn btn-white" href="/products/ec-copy-beta/">プロプランを見る →</a>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>© よへラボ / EC商品説明・Q&A整備</div>
        <div class="footer-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a href="/legal/privacy/">プライバシーポリシー</a>
        </div>
      </div>
    </footer>

    <script>
      const descOutput = document.getElementById("desc-output");
      const faqOutput = document.getElementById("faq-output");
      const btn = document.querySelector("#ec-form button[type=submit]");

      async function renderEC() {
        const productName = document.getElementById("ec-name").value.trim();
        const target = document.getElementById("audience").value.trim();
        const features = document.getElementById("features").value.trim();
        const category = document.getElementById("concerns").value.trim();
        if (!productName || !features) { descOutput.textContent = "商品名と特徴を入力してください。"; return; }

        btn.disabled = true;
        btn.textContent = "生成中…";
        descOutput.textContent = "AIが商品説明文を考えています…";
        faqOutput.textContent = "AIがQ&Aを考えています…";

        try {
          const [descRes, qaRes] = await Promise.all([
            fetch("/api/generate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tool: "ec_description", data: { productName, category, features, target } }),
            }),
            fetch("/api/generate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tool: "ec_qa", data: { productName, category, features } }),
            }),
          ]);
          const descJson = await descRes.json();
          const qaJson = await qaRes.json();
          descOutput.textContent = descJson.result || "生成に失敗しました。";
          faqOutput.textContent = qaJson.result || "生成に失敗しました。";
        } catch {
          descOutput.textContent = "通信エラーが発生しました。もう一度お試しください。";
          faqOutput.textContent = "";
        } finally {
          btn.disabled = false;
          btn.textContent = "説明文を作る";
        }
      }

      document.getElementById("ec-form").addEventListener("submit", e => { e.preventDefault(); renderEC(); });
    </script>
  </body>
</html>
