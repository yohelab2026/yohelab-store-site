<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EC商品説明・Q&A整備 | よへラボ</title>
    <link rel="icon" type="image/png" href="../../yohelab-icon.png" />
    <link rel="stylesheet" href="../../shared/site.css" />
  </head>
  <body>
    <header class="shell topbar">
      <a class="brand" href="../../index.html">
        <img src="../../yohelab-icon.png" alt="よへラボのアイコン" />
        <span>よへラボ</span>
      </a>
      <nav class="mini-nav">
        <a href="../../index.html">トップへ戻る</a>
        <a href="../aio-mini/index.html">AIOミニ診断</a>
      </nav>
    </header>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">売るための文章</div>
        <h1>商品説明とQ&amp;Aをまとめて整える。</h1>
        <p class="lead">商品名、特徴、相手の悩みを入れると、説明文、強みの箇条書き、よくある質問まで返す。</p>
      </section>
      <section class="grid">
        <form class="panel stack" id="ec-form">
          <h2>商品情報を入れる</h2>
          <label>商品名<input id="name" value="やわらかリネンのエプロン" /></label>
          <label>誰向けか<input id="audience" value="料理をするときも気分よく過ごしたい人" /></label>
          <label>特徴<textarea id="features">軽い。肩がこりにくい。洗っても乾きやすい。見えても生活感が出にくい。</textarea></label>
          <label>よく聞かれる不安<textarea id="concerns">透けないか。洗濯しやすいか。プレゼントに向くか。</textarea></label>
          <button class="button primary" type="submit">説明文を作る</button>
        </form>
        <div class="results">
          <article class="result-card">
            <h3>商品説明</h3>
            <div class="output-box" id="desc-output"></div>
          </article>
          <article class="result-card">
            <h3>Q&amp;A</h3>
            <div class="output-box" id="faq-output"></div>
          </article>
        </div>
      </section>
    </main>
    <footer class="shell footer">よへラボ / EC商品説明・Q&A整備</footer>
    <script>
      function renderEC() {
        const name = document.getElementById("name").value.trim();
        const audience = document.getElementById("audience").value.trim();
        const features = document.getElementById("features").value.trim();
        const concerns = document.getElementById("concerns").value.split("。").map((item) => item.trim()).filter(Boolean);
        document.getElementById("desc-output").textContent = `${name}\n\n${audience} に向けて作った、毎日の使いやすさを優先したアイテムです。\n\n${features}\n\n見た目だけでなく、使うたびに気分が下がりにくいことを大事にしました。商品ページでは、使う場面がすぐ浮かぶ言葉で伝えると選ばれやすくなります。`;
        document.getElementById("faq-output").textContent = concerns.map((item, index) => `Q${index + 1}. ${item}？\nA${index + 1}. ここは購入前に気になりやすい点なので、素材・使い方・実際の印象がすぐ分かる説明を入れると安心されやすい。`).join("\n\n");
      }
      document.getElementById("ec-form").addEventListener("submit", (event) => {
        event.preventDefault();
        renderEC();
      });
      renderEC();
    </script>
  </body>
</html>
