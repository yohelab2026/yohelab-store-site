<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI応募文アシスタント | よへラボ</title>
    <meta name="description" content="案件の要点と自分の強みを入れると、直しやすい応募文の骨組みをすぐ返す。無料・登録不要。" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0d6b58" />
    <link rel="canonical" href="https://yohelab.com/apps/proposal/" />
    <link rel="icon" type="image/png" href="/yohelab-icon.png" />
    <link rel="stylesheet" href="/shared/site.css" />
    <style>
      .app-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; padding: 32px 0 80px; align-items: start; }
      .app-panel { position: sticky; top: 88px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .app-panel h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
      .form-stack { display: grid; gap: 16px; }
      .output-area { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .output-area h3 { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
      .draft-box { font-size: 15px; line-height: 1.9; white-space: pre-wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; color: #2a3240; min-height: 200px; }
      .app-intro { padding: 40px 0 0; text-align: center; }
      .app-intro h1 { font-size: clamp(26px,5vw,40px); margin-bottom: 12px; }
      .app-intro p { color: var(--muted); font-size: 17px; margin-bottom: 8px; }
      .app-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
      .app-chip { padding: 5px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; color: var(--muted); font-weight: 600; }
      .upsell-bar { padding: 28px 32px; border-radius: 20px; background: linear-gradient(135deg,#0d1a16,#0d2b24); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-top: 32px; }
      .upsell-bar h3 { font-size: 18px; margin-bottom: 6px; color: #fff; }
      .upsell-bar p { font-size: 14px; color: rgba(255,255,255,.7); margin: 0; }
      @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } .app-panel { position: static; } }
    </style>
  </head>
  <body>

    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <img src="/yohelab-icon.png" alt="よへラボのアイコン" />
          <span>よへラボ</span>
        </a>
        <nav class="nav-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a class="btn btn-primary btn-sm" href="/products/proposal-beta/">プロプランを見る</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">

        <div class="app-intro">
          <h1>AI応募文アシスタント</h1>
          <p>案件の要点と自分の強みを入れると、直しやすい応募文の骨組みが返る。</p>
          <div class="app-chips">
            <span class="app-chip">登録不要</span>
            <span class="app-chip">ブラウザで今すぐ使える</span>
            <span class="app-chip">案件レーダーの次に使うと効果的</span>
          </div>
        </div>

        <div class="app-layout">

          <div class="app-panel">
            <h2>条件を入れる</h2>
            <form class="form-stack" id="proposal-form">
              <label>案件名
                <input id="project" value="LP文章の構成と執筆" placeholder="例: LP制作、ブログ記事10本" />
              </label>
              <label>依頼の要点
                <textarea id="needs">個人コーチ向けのLP。サービス内容を言語化しつつ、申し込みにつながる文章にしたい。</textarea>
              </label>
              <label>自分の強み
                <textarea id="strength">ヒアリング内容を整理して構成に落とすのが得意。返信が早い。初稿も早い。</textarea>
              </label>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <label>雰囲気
                  <select id="tone">
                    <option value="丁寧">丁寧</option>
                    <option value="やわらかめ">やわらかめ</option>
                    <option value="端的">端的</option>
                  </select>
                </label>
                <label>締め方
                  <select id="close">
                    <option value="相談歓迎">相談歓迎</option>
                    <option value="すぐ着手可能">すぐ着手可能</option>
                    <option value="実績共有">実績共有</option>
                  </select>
                </label>
              </div>
              <button class="btn btn-primary" style="width:100%;height:50px;" type="submit">応募文を作る</button>
              <p style="font-size:12px;color:var(--muted);text-align:center;">入力内容はサーバーに保存しません</p>
            </form>
          </div>

          <div class="output-area">
            <h3>応募文の下書き</h3>
            <div class="draft-box" id="proposal-output"></div>
            <div style="display:flex;gap:10px;margin-top:14px;">
              <button class="btn btn-outline btn-sm" id="copy-proposal" type="button">コピー</button>
            </div>
          </div>

        </div>

        <div class="upsell-bar">
          <div>
            <h3>複数案を比べて、一番使えるものを選びたい</h3>
            <p>プロプランでは文体違い・複数案・再編集まで対応。応募文の精度をさらに上げられる。</p>
          </div>
          <a class="btn btn-white" href="/products/proposal-beta/">プロプランを見る →</a>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>© よへラボ / AI応募文アシスタント</div>
        <div class="footer-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a href="/legal/privacy/">プライバシーポリシー</a>
        </div>
      </div>
    </footer>

    <div class="toast" id="copy-toast">コピーしました</div>

    <script>
      const output = document.getElementById("proposal-output");
      const toast = document.getElementById("copy-toast");
      const btn = document.querySelector("#proposal-form button[type=submit]");

      async function build() {
        const project = document.getElementById("project").value.trim();
        const needs = document.getElementById("needs").value.trim();
        const strength = document.getElementById("strength").value.trim();
        const tone = document.getElementById("tone").value;
        const close = document.getElementById("close").value;
        if (!project || !needs || !strength) { output.textContent = "案件名・依頼の要点・自分の強みを入力してください。"; return; }

        btn.disabled = true;
        btn.textContent = "生成中…";
        output.textContent = "AIが応募文を考えています…";

        try {
          const res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tool: "proposal", data: { project, needs, strength, tone, close } }),
          });
          const json = await res.json();
          output.textContent = json.result || "生成に失敗しました。もう一度お試しください。";
        } catch {
          output.textContent = "通信エラーが発生しました。もう一度お試しください。";
        } finally {
          btn.disabled = false;
          btn.textContent = "応募文を作る";
        }
      }

      document.getElementById("proposal-form").addEventListener("submit", e => { e.preventDefault(); build(); });

      document.getElementById("copy-proposal").addEventListener("click", async () => {
        await navigator.clipboard.writeText(output.textContent);
        toast.classList.add("show"); toast.hidden = false;
        clearTimeout(window._t);
        window._t = setTimeout(() => { toast.classList.remove("show"); toast.hidden = true; }, 1600);
      });
    </script>
  </body>
</html>
