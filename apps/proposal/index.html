<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提案文・応募文ジェネレーター | よへラボ</title>
    <link rel="icon" type="image/png" href="../../yohelab-icon.png" />
    <link rel="stylesheet" href="../../shared/site.css" />
  </head>
  <body>
    <header class="shell topbar">
      <a class="brand" href="../../index.html">
        <img src="../../yohelab-icon.png" alt="よへラボのアイコン" />
        <span>よへラボ</span>
      </a>
      <nav class="mini-nav">
        <a href="../../index.html">トップへ戻る</a>
        <a href="../radar/index.html">案件レーダー</a>
      </nav>
    </header>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">応募を早くする</div>
        <h1>応募文を、叩き台から始める。</h1>
        <p class="lead">案件の内容、自分の強み、提案の温度感を入れると、そのまま直しやすい応募文の骨組みを返す。</p>
      </section>
      <section class="grid">
        <form class="panel stack" id="proposal-form">
          <h2>内容を入れる</h2>
          <label>案件名<input id="project" value="LP文章の構成と執筆" /></label>
          <label>依頼の要点<textarea id="needs">個人コーチ向けのLP。サービス内容を言語化しつつ、申し込みにつながる文章にしたい。</textarea></label>
          <label>自分の強み<textarea id="strength">ヒアリング内容を整理して構成に落とすのが得意。返信が早い。初稿も早い。</textarea></label>
          <div class="row">
            <label>雰囲気
              <select id="tone">
                <option value="丁寧">丁寧</option>
                <option value="やわらかめ">やわらかめ</option>
                <option value="端的">端的</option>
              </select>
            </label>
            <label>締め方
              <select id="close">
                <option value="相談歓迎">相談歓迎</option>
                <option value="すぐ着手可能">すぐ着手可能</option>
                <option value="実績共有">実績共有</option>
              </select>
            </label>
          </div>
          <button class="button primary" type="submit">応募文を作る</button>
        </form>
        <div class="results">
          <article class="result-card">
            <h3>応募文</h3>
            <div class="output-box" id="proposal-output"></div>
            <div class="inline-actions">
              <button class="button secondary" id="copy-proposal" type="button">コピー</button>
            </div>
          </article>
        </div>
      </section>
    </main>
    <footer class="shell footer">よへラボ / 提案文・応募文ジェネレーター</footer>
    <script>
      const output = document.getElementById("proposal-output");
      function build() {
        const project = document.getElementById("project").value.trim();
        const needs = document.getElementById("needs").value.trim();
        const strength = document.getElementById("strength").value.trim();
        const tone = document.getElementById("tone").value;
        const close = document.getElementById("close").value;
        output.textContent = `はじめまして。${project}の募集を拝見し、内容を見てすぐ力になれそうだと思いご連絡しました。\n\n依頼内容の理解としては、${needs}\n\n自分は ${strength} ので、最初に方向性を整理してから、無理のない形で初稿まで進められます。文面のトーンは${tone}に合わせて調整できます。\n\nもし必要なら、作業の流れや着手イメージも短く共有できます。${close}。`;
      }
      document.getElementById("proposal-form").addEventListener("submit", (event) => {
        event.preventDefault();
        build();
      });
      document.getElementById("copy-proposal").addEventListener("click", async () => {
        await navigator.clipboard.writeText(output.textContent);
      });
      build();
    </script>
  </body>
</html>
