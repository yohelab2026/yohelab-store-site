<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X返信・投稿補助 | よへラボ</title>
    <link rel="icon" type="image/png" href="../../yohelab-icon.png" />
    <link rel="stylesheet" href="../../shared/site.css" />
  </head>
  <body>
    <header class="shell topbar">
      <a class="brand" href="../../index.html">
        <img src="../../yohelab-icon.png" alt="よへラボのアイコン" />
        <span>よへラボ</span>
      </a>
      <nav class="mini-nav">
        <a href="../../index.html">トップへ戻る</a>
        <a href="../ec-copy/index.html">EC商品説明</a>
      </nav>
    </header>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">発信を続ける</div>
        <h1>Xの投稿も返信も、止まりにくくする。</h1>
        <p class="lead">話したいテーマと届けたい相手を入れると、短い投稿案と返信案をまとめて返す。</p>
      </section>
      <section class="grid">
        <form class="panel stack" id="x-form">
          <h2>テーマを入れる</h2>
          <label>テーマ<input id="topic" value="副業で応募しやすい案件の見つけ方" /></label>
          <label>届けたい相手<input id="audience" value="副業を始めたいけど案件探しで止まっている人" /></label>
          <label>言いたいこと<textarea id="point">条件に合う案件だけを先に見られるだけで、応募まで進みやすくなる。探す時間を減らしたい。</textarea></label>
          <label>雰囲気
            <select id="voice">
              <option value="親しみやすく">親しみやすく</option>
              <option value="少し強めに">少し強めに</option>
              <option value="落ち着いて">落ち着いて</option>
            </select>
          </label>
          <button class="button primary" type="submit">投稿案を作る</button>
        </form>
        <div class="results">
          <article class="result-card">
            <h3>投稿案</h3>
            <div class="output-box" id="posts-output"></div>
          </article>
          <article class="result-card">
            <h3>返信案</h3>
            <div class="output-box" id="replies-output"></div>
          </article>
        </div>
      </section>
    </main>
    <footer class="shell footer">よへラボ / X返信・投稿補助</footer>
    <script>
      function renderX() {
        const topic = document.getElementById("topic").value.trim();
        const audience = document.getElementById("audience").value.trim();
        const point = document.getElementById("point").value.trim();
        const voice = document.getElementById("voice").value;
        const posts = [
          `案件探しで止まる人、けっこう多い。\n${topic} って、情報が多いほど逆に迷いやすい。\n${point}\n${voice}話すなら、まず「今日見る案件を減らす」が効く。`,
          `${audience} に一番足りないの、やる気じゃなくて順番かもしれない。\n${topic} を考える時は、探す→選ぶ→書く を分けるだけでかなり進む。`,
          `「副業したいけど探すだけで疲れる」\nそれなら、全部見るんじゃなくて、応募しやすい案件だけ先に見る仕組みを作るとラク。`
        ];
        const replies = [
          `わかる。案件探しって、探してる時間だけで消耗しやすいよね。まずは条件を絞って「今日見る案件」を減らすのが一番ラクだった。`,
          `その感覚かなり自然。情報量が多いと止まりやすいから、探すより先に「外す条件」を決めると進みやすい。`,
          `それなら、応募文まで一気に作れる形にすると止まりにくい。探す→書く の間で勢いが切れやすいから。`
        ];
        document.getElementById("posts-output").textContent = posts.map((text, index) => `案${index + 1}\n${text}`).join("\n\n");
        document.getElementById("replies-output").textContent = replies.map((text, index) => `返信${index + 1}\n${text}`).join("\n\n");
      }
      document.getElementById("x-form").addEventListener("submit", (event) => {
        event.preventDefault();
        renderX();
      });
      renderX();
    </script>
  </body>
</html>
