<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI X投稿・返信補助 | よへラボ</title>
    <meta name="description" content="テーマと言いたいことを入れると、Xの投稿案と返信案をすぐ返す。無料・登録不要。" />
    <meta property="og:title" content="AI X投稿・返信補助 | よへラボ" />
    <meta property="og:description" content="テーマと言いたいことを入れると、Xの投稿案と返信案をすぐ返す。無料・登録不要。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yohelab.com/apps/x-helper/" />
    <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="theme-color" content="#0d6b58" />
    <link rel="canonical" href="https://yohelab.com/apps/x-helper/" />
    <link rel="icon" type="image/png" href="/yohelab-icon.png" />
    <link rel="stylesheet" href="/shared/site.css" />
    <style>
      .app-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; padding: 32px 0 80px; align-items: start; }
      .app-panel { position: sticky; top: 88px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .app-panel h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
      .form-stack { display: grid; gap: 16px; }
      .output-grid { display: grid; gap: 20px; }
      .output-area { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); }
      .output-area h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; }
      .draft-box { font-size: 14px; line-height: 1.9; white-space: pre-wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; color: #2a3240; }
      .app-intro { padding: 40px 0 0; text-align: center; }
      .app-intro h1 { font-size: clamp(26px,5vw,40px); margin-bottom: 12px; }
      .app-intro p { color: var(--muted); font-size: 17px; margin-bottom: 8px; }
      .app-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
      .app-chip { padding: 5px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; color: var(--muted); font-weight: 600; }
      .upsell-bar { padding: 28px 32px; border-radius: 20px; background: linear-gradient(135deg,#0d1a16,#0d2b24); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-top: 32px; }
      .upsell-bar h3 { font-size: 18px; margin-bottom: 6px; color: #fff; }
      .upsell-bar p { font-size: 14px; color: rgba(255,255,255,.7); margin: 0; }
      @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } .app-panel { position: static; } }
    </style>
  </head>
  <body>

    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <img src="/yohelab-icon.png" alt="よへラボのアイコン" />
          <span>よへラボ</span>
        </a>
        <nav class="nav-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a class="btn btn-primary btn-sm" href="/products/x-helper-beta/">プロプランを見る</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">

        <div class="app-intro">
          <h1>AI X投稿・返信補助</h1>
          <p>テーマと言いたいことを入れると、投稿案3本と返信案3本がすぐ返る。</p>
          <div class="app-chips">
            <span class="app-chip">登録不要</span>
            <span class="app-chip">SNS連携なし</span>
            <span class="app-chip">入力内容は保存しない</span>
          </div>
        </div>

        <div class="app-layout">

          <div class="app-panel">
            <h2>条件を入れる</h2>
            <form class="form-stack" id="x-form">
              <label>テーマ
                <input id="topic" value="副業で応募しやすい案件の見つけ方" placeholder="例: 副業の案件探し、フリーランスの時間管理" />
              </label>
              <label>届けたい相手
                <input id="audience" value="副業を始めたいけど案件探しで止まっている人" placeholder="例: 副業初心者、フリーランス1年目" />
              </label>
              <label>言いたいこと
                <textarea id="point">条件に合う案件だけを先に見られるだけで、応募まで進みやすくなる。探す時間を減らしたい。</textarea>
              </label>
              <label>雰囲気
                <select id="voice">
                  <option value="親しみやすく">親しみやすく</option>
                  <option value="少し強めに">少し強めに</option>
                  <option value="落ち着いて">落ち着いて</option>
                </select>
              </label>
              <button class="btn btn-primary" style="width:100%;height:50px;" type="submit">投稿案を作る</button>
              <p style="font-size:12px;color:var(--muted);text-align:center;">入力内容はサーバーに保存しません</p>
            </form>
          </div>

          <div class="output-grid">
            <div class="output-area">
              <h3>投稿案（3本）</h3>
              <div class="draft-box" id="posts-output"></div>
            </div>
            <div class="output-area">
              <h3>返信案（3本）</h3>
              <div class="draft-box" id="replies-output"></div>
            </div>
          </div>

        </div>

        <div class="upsell-bar">
          <div>
            <h3>毎日の発信を、止まらずに続けたい</h3>
            <p>プロプランでは切り口違い・保存・トーン別返答まで。Xの発信をルーティン化できる。</p>
          </div>
          <a class="btn btn-white" href="/products/x-helper-beta/">プロプランを見る →</a>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>© よへラボ / AI X投稿・返信補助</div>
        <div class="footer-links">
          <a href="/">トップ</a>
          <a href="/apps/radar/">案件レーダー</a>
          <a href="/contact/">問い合わせ</a>
          <a href="/legal/privacy/">プライバシーポリシー</a>
        </div>
      </div>
    </footer>

    <script>
      const postsOutput = document.getElementById("posts-output");
      const repliesOutput = document.getElementById("replies-output");
      const btn = document.querySelector("#x-form button[type=submit]");

      async function renderX() {
        const theme = document.getElementById("topic").value.trim();
        const target = document.getElementById("audience").value.trim();
        const message = document.getElementById("point").value.trim();
        const tone = document.getElementById("voice").value;
        if (!theme || !message) { postsOutput.textContent = "テーマと言いたいことを入力してください。"; return; }

        btn.disabled = true;
        btn.textContent = "生成中…";
        postsOutput.textContent = "AIが投稿案を考えています…";
        repliesOutput.textContent = "AIが返信案を考えています…";

        try {
          const [postsRes, repliesRes] = await Promise.all([
            fetch("/api/generate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tool: "x_post", data: { theme, target, message, tone } }),
            }),
            fetch("/api/generate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tool: "x_reply", data: { original: message, character: target, tone } }),
            }),
          ]);
          const postsJson = await postsRes.json();
          const repliesJson = await repliesRes.json();
          postsOutput.textContent = postsJson.result || "生成に失敗しました。";
          repliesOutput.textContent = repliesJson.result || "生成に失敗しました。";
        } catch {
          postsOutput.textContent = "通信エラーが発生しました。もう一度お試しください。";
          repliesOutput.textContent = "";
        } finally {
          btn.disabled = false;
          btn.textContent = "投稿案を作る";
        }
      }

      document.getElementById("x-form").addEventListener("submit", e => { e.preventDefault(); renderX(); });
    </script>
  </body>
</html>
