<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません | よへラボ</title>
  <meta name="description" content="お探しのページは見つかりませんでした。よへラボのトップへ戻るか、ツール・サービスページから探してください。" />
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <style>
    :root {
      --text: #15201d;
      --muted: #60706b;
      --border: rgba(11,143,114,.16);
      --green-dark: #08745d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(11,143,114,.12), transparent 60%),
        linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
    }
    .e404-card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border-radius: 28px;
      padding: 56px 36px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(11,143,114,.08), 0 0 0 1px rgba(11,143,114,.08);
    }
    .e404-num {
      font-size: clamp(72px, 12vw, 120px);
      font-weight: 900;
      letter-spacing: -.06em;
      line-height: 1;
      background: linear-gradient(135deg, #0b8f72, #1fb6cf, #3f8cff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .e404-card h1 {
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: -.03em;
      margin-bottom: 14px;
    }
    .e404-card p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
      margin-bottom: 28px;
    }
    .e404-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
    }
    .e404-actions .btn-primary {
      background: linear-gradient(135deg, #0b8f72, #1fb6cf);
      color: #fff;
      border: none;
      box-shadow: 0 12px 28px rgba(11,143,114,.28);
    }
    .btn-outline {
      color: var(--green-dark);
      border: 1px solid var(--border);
      background: #fff;
    }
    .e404-links {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .e404-links a {
      font-size: 13px;
      color: var(--green-dark);
      font-weight: 700;
      text-decoration: none;
    }
    .e404-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="e404-card">
    <div class="e404-num">404</div>
    <h1>ページが見つかりません</h1>
    <p>探しているページは移動したか、削除された可能性があります。<br />トップから探すか、ツール・サービスページに移動してください。</p>
    <div class="e404-actions">
      <a class="btn btn-primary btn-lg" href="/">トップに戻る</a>
      <a class="btn btn-outline btn-lg" href="/tools/">ツール一覧</a>
    </div>
    <div class="e404-links">
      <a href="/tools/">ツール</a>
      <a href="/services/">サービス</a>
      <a href="/blog/">ブログ</a>
      <a href="/contact/">問い合わせ</a>
    </div>
  </main>
</body>
</html>
