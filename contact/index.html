<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問い合わせ | よへラボ</title>
  <meta name="description" content="よへラボへの問い合わせ窓口。サイトの誤字、リンク切れ、公開内容、過去の購入に関する事務連絡を受け付けます。" />
  <meta property="og:title" content="問い合わせ | よへラボ" />
  <meta property="og:description" content="サイトの誤字、リンク切れ、公開内容、過去の購入に関する事務連絡を受け付けます。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:url" content="https://yohelab.com/contact/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-mascot-v2-20260518.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1" />
  <link rel="canonical" href="https://yohelab.com/contact/" />
  <link rel="icon" type="image/png" href="/yohelab-mascot-v2-20260518-32.png" />
  <link rel="stylesheet" href="/shared/site.min.css" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"ContactPage","name":"問い合わせ | よへラボ","url":"https://yohelab.com/contact/","description":"よへラボへの問い合わせ窓口","mainEntity":{"@type":"Organization","name":"よへラボ","url":"https://yohelab.com/","contactPoint":{"@type":"ContactPoint","contactType":"customer support","availableLanguage":"Japanese","url":"https://yohelab.com/contact/"}}}</script>
  <style>
    body { background:#f8fbf9; }
    .header { background:#fff;border-bottom:3px solid #087a63;position:sticky;top:0;z-index:100; }
    .header-inner { max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:20px;min-height:56px; }
    .brand { display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;color:#087a63;text-decoration:none; }
    .brand img { width:36px;height:36px;border-radius:8px; }
    .nav { display:flex;align-items:center;gap:4px;flex-wrap:wrap; }
    .nav a { padding:5px 11px;border-radius:4px;font-size:13px;font-weight:700;color:#444;text-decoration:none; }
    .shell { width:min(820px,100% - 36px); margin:0 auto; padding:54px 0 80px; }
    .hero { text-align:center;margin-bottom:26px; }
    .hero h1 { font-size:clamp(34px,6vw,56px);line-height:1.12;letter-spacing:0;margin:0 0 12px; }
    .hero p { color:var(--muted);font-size:16px;line-height:1.9;margin:0 auto;max-width:680px; }
    .box { background:#fff;border:1px solid var(--border);border-radius:8px;padding:26px;box-shadow:var(--shadow-sm); }
    .notice { padding:14px 16px;border-radius:8px;background:#f0f8f4;border:1px solid #cfe9df;color:#314942;font-size:14px;line-height:1.8;margin-bottom:16px; }
    .notice strong { display:block;color:#075c4c;margin-bottom:3px; }
    .grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    label { display:grid;gap:6px;font-size:13px;font-weight:800;color:#314942; }
    input, select, textarea { width:100%;border:1px solid var(--border);border-radius:8px;padding:11px 12px;font:inherit;background:#fff; }
    textarea { min-height:150px;resize:vertical; }
    button { width:100%;min-height:52px;border:0;border-radius:8px;background:#087a63;color:#fff;font:inherit;font-weight:900;cursor:pointer; }
    .thanks-box { display:none;margin-bottom:16px;padding:16px;border-radius:8px;background:#fff7ed;border:1px solid #ffd7ad;color:#6b3a10; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    @media(max-width:720px){ .header-inner{align-items:flex-start;flex-direction:column;padding:10px 16px;} .grid{grid-template-columns:1fr;} .box{padding:20px;} }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="/"><img src="/yohelab-mascot-v2-20260518-64.png" alt="よへラボ" width="36" height="36" decoding="async" />よへラボ</a>
      <nav class="nav" aria-label="主要ナビゲーション">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/games/">ゲーム</a>
        <a href="/about/">サイトについて</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <h1>問い合わせ</h1>
      <p>サイトの誤字、リンク切れ、公開内容への問い合わせ、過去の購入に関する事務連絡はこちらから送れます。</p>
    </section>

    <section class="box">
      <div class="notice">
        <strong>送る前に</strong>
        URL、見ていたページ、起きたことを添えると確認が早くなります。返信が必要な内容は、内容を確認してから順次対応します。
      </div>
      <div class="thanks-box" id="thanks-box">
        <h2>受け取りました</h2>
        <p>内容を確認します。返信が必要なものは順次対応します。</p>
      </div>
      <form id="contact-form" class="stack" action="/api/contact" method="post">
        <div class="grid">
          <label>名前<input id="name" name="name" autocomplete="name" required /></label>
          <label>返信先メール<input id="email" name="email" type="email" autocomplete="email" required /></label>
        </div>
        <label>問い合わせ内容
          <select id="purpose" name="purpose" required>
            <option value="サイトの誤字・リンク切れ">サイトの誤字・リンク切れ</option>
            <option value="公開内容について">公開内容について</option>
            <option value="過去の購入に関する連絡">過去の購入に関する連絡</option>
            <option value="販売者情報請求">販売者情報請求</option>
            <option value="その他">その他</option>
          </select>
        </label>
        <label>本文
          <textarea id="message" name="message" placeholder="URL、確認したい内容、発生した状況などを書いてください。"></textarea>
        </label>
        <label class="sr-only" for="website">入力しないでください</label>
        <input id="website" class="sr-only" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />
        <input id="turnstile-token" type="hidden" name="turnstile_token" />
        <div id="turnstile-widget" class="turnstile-slot" aria-label="スパム対策"></div>
        <button type="submit">問い合わせを送る</button>
        <p style="font-size:12.5px;color:var(--muted);margin-top:4px;">送信内容は問い合わせ対応のためだけに使います。</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("contact-form");
    const thanks = document.getElementById("thanks-box");
    form?.addEventListener("submit", async (event) => {
      event.preventDefault();
      const response = await fetch(form.action, { method: "POST", body: new FormData(form) });
      if (response.ok) {
        form.reset();
        thanks.style.display = "block";
        thanks.scrollIntoView({ behavior: "smooth", block: "center" });
      } else {
        alert("送信できませんでした。時間を置いて再度お試しください。");
      }
    });
  </script>
</body>
</html>
