name: LINE rich menu setup

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets/line/rich-menu-bunsirube.png
      - scripts/setup-line-rich-menu.mjs
      - .github/workflows/line-rich-menu.yml

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run line:rich-menu
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
