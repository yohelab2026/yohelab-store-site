name: Search discovery notify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for Pages deployment
        run: sleep 150
      - name: Notify IndexNow search engines
        run: npm run seo:notify
