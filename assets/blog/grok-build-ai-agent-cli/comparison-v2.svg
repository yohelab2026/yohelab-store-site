<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10142a"/>
      <stop offset="100%" stop-color="#0a1f18"/>
    </linearGradient>
    <linearGradient id="grok" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2cff8f"/>
      <stop offset="100%" stop-color="#17b06d"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7dff"/>
      <stop offset="100%" stop-color="#4eb4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="130" r="160" fill="#8b7dff" fill-opacity="0.13"/>
  <circle cx="1420" cy="160" r="220" fill="#2cff8f" fill-opacity="0.10"/>
  <circle cx="1380" cy="770" r="180" fill="#4eb4ff" fill-opacity="0.11"/>

  <text x="800" y="94" text-anchor="middle" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="54" font-weight="900" fill="#f8fbff">Grok Build / Claude Code 比較</text>
  <text x="800" y="138" text-anchor="middle" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="24" font-weight="800" fill="#a8bed0">どっちが強いかより、どこで使うと気持ちいいかを見る図</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="1440" height="610" rx="32" fill="#0a1020" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <g font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-weight="900">
    <rect x="138" y="238" width="250" height="50" rx="25" fill="#ffffff"/>
    <text x="263" y="272" text-anchor="middle" font-size="22" fill="#101820">比較軸</text>
    <rect x="442" y="238" width="450" height="50" rx="25" fill="url(#grok)"/>
    <text x="667" y="272" text-anchor="middle" font-size="22" fill="#ffffff">Grok Build</text>
    <rect x="928" y="238" width="450" height="50" rx="25" fill="url(#claude)"/>
    <text x="1153" y="272" text-anchor="middle" font-size="22" fill="#ffffff">Claude Code</text>

    <g font-size="24" fill="#f6fbff">
      <text x="148" y="360">入口の軽さ</text>
      <text x="148" y="464">自動化の広がり</text>
      <text x="148" y="568">レビューのしやすさ</text>
      <text x="148" y="672">副業ツールとの相性</text>
      <text x="148" y="776">SNSでの伝わりやすさ</text>
    </g>
  </g>

  <g>
    <rect x="442" y="332" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="442" y="332" width="390" height="34" rx="17" fill="url(#grok)"/>
    <rect x="928" y="332" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="928" y="332" width="360" height="34" rx="17" fill="url(#claude)"/>

    <rect x="442" y="436" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="442" y="436" width="408" height="34" rx="17" fill="url(#grok)"/>
    <rect x="928" y="436" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="928" y="436" width="390" height="34" rx="17" fill="url(#claude)"/>

    <rect x="442" y="540" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="442" y="540" width="360" height="34" rx="17" fill="url(#grok)"/>
    <rect x="928" y="540" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="928" y="540" width="420" height="34" rx="17" fill="url(#claude)"/>

    <rect x="442" y="644" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="442" y="644" width="402" height="34" rx="17" fill="url(#grok)"/>
    <rect x="928" y="644" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="928" y="644" width="362" height="34" rx="17" fill="url(#claude)"/>

    <rect x="442" y="748" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="442" y="748" width="420" height="34" rx="17" fill="url(#grok)"/>
    <rect x="928" y="748" width="450" height="34" rx="17" fill="#23364a"/>
    <rect x="928" y="748" width="390" height="34" rx="17" fill="url(#claude)"/>
  </g>

  <g font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="20" font-weight="800">
    <text x="848" y="354" text-anchor="end" fill="#dfffee">軽い</text>
    <text x="1322" y="354" text-anchor="end" fill="#e8eeff">安定</text>
    <text x="848" y="458" text-anchor="end" fill="#dfffee">広い</text>
    <text x="1322" y="458" text-anchor="end" fill="#e8eeff">深い</text>
    <text x="848" y="562" text-anchor="end" fill="#dfffee">見やすい</text>
    <text x="1322" y="562" text-anchor="end" fill="#e8eeff">レビュー向き</text>
    <text x="848" y="666" text-anchor="end" fill="#dfffee">向く</text>
    <text x="1322" y="666" text-anchor="end" fill="#e8eeff">向く</text>
    <text x="848" y="770" text-anchor="end" fill="#dfffee">派手</text>
    <text x="1322" y="770" text-anchor="end" fill="#e8eeff">落ち着き</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="100" y="836" width="1400" height="26" rx="13" fill="#ffffff" fill-opacity="0.10"/>
    <text x="120" y="854" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="18" font-weight="800" fill="#dce8f6">見方: 数値の優劣より、「どこで飛びつきやすいか」を整理したイメージ図</text>
  </g>
</svg>
