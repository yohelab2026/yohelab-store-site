<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090912"/>
      <stop offset="48%" stop-color="#111833"/>
      <stop offset="100%" stop-color="#061a16"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9d6bff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3d9cff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23d18b" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#f6d54a" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="350" cy="140" r="340" fill="url(#leftGlow)" opacity="0.55"/>
