    <text x="800" y="444" text-anchor="middle" font-family="Arial, 'Yu Gothic', sans-serif" font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-3">VS</text>
    <path d="M722 430L760 392L786 414L825 366L848 390L877 378L841 438L868 456L822 502L787 478L750 520L733 494L760 448Z" fill="#ffcd38" fill-opacity="0.92"/>
