    <text x="175" y="360" font-family="Consolas, monospace" font-size="28" fill="#93a5ff">review();</text>
    <text x="175" y="402" font-family="Consolas, monospace" font-size="28" fill="#93a5ff">refine();</text>
    <text x="175" y="444" font-family="Consolas, monospace" font-size="28" fill="#93a5ff">test();</text>
