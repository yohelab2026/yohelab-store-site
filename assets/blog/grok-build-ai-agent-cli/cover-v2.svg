    <text x="1105" y="238" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="34" font-weight="800" fill="#dffcee">速い・見せ方強い・入口が軽い</text>
    <text x="1105" y="318" font-family="Consolas, monospace" font-size="28" fill="#8bffb7">build --plan</text>
    <text x="1105" y="360" font-family="Consolas, monospace" font-size="28" fill="#8bffb7">agent --subagents</text>
    <text x="1105" y="402" font-family="Consolas, monospace" font-size="28" fill="#8bffb7">imagine --attach</text>
    <text x="1105" y="444" font-family="Consolas, monospace" font-size="28" fill="#8bffb7">git --diff</text>
