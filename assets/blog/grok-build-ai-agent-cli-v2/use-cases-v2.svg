<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="195" cy="150" r="140" fill="#ffe8c4"/>
  <circle cx="1410" cy="140" r="170" fill="#ccefff"/>
  <circle cx="1400" cy="770" r="180" fill="#dff7ea"/>

  <text x="800" y="94" text-anchor="middle" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="54" font-weight="900" fill="#10202a">どこに刺さる？</text>
  <text x="800" y="138" text-anchor="middle" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-size="24" font-weight="800" fill="#5b7085">Grok Buildが飛びつかれやすい3つの使い道</text>

  <g filter="url(#shadow)">
    <rect x="96" y="210" width="420" height="500" rx="30" fill="#ffffff"/>
    <rect x="590" y="210" width="420" height="500" rx="30" fill="#ffffff"/>
    <rect x="1084" y="210" width="420" height="500" rx="30" fill="#ffffff"/>
  </g>

  <g font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-weight="900">
    <circle cx="306" cy="300" r="82" fill="#e8f1ff"/>
    <path d="M286 282h40v40h-40z" fill="#2c7cff"/>
    <path d="M280 322h52l18 30h-88z" fill="#2c7cff" fill-opacity="0.9"/>
    <text x="306" y="420" text-anchor="middle" font-size="34" fill="#10202a">開発者</text>
    <text x="306" y="468" text-anchor="middle" font-size="22" fill="#5b7085">コード・レビュー・検証を</text>
    <text x="306" y="498" text-anchor="middle" font-size="22" fill="#5b7085">ひとまとめで回したい人</text>
    <rect x="186" y="556" width="240" height="46" rx="23" fill="#2c7cff"/>
    <text x="306" y="586" text-anchor="middle" font-size="20" fill="#ffffff">ターミナルで一気に進める</text>

    <circle cx="800" cy="300" r="82" fill="#eafaf3"/>
    <path d="M765 330c0-26 15-42 35-42s35 16 35 42" fill="#18b36d"/>
    <circle cx="788" cy="289" r="9" fill="#18b36d"/>
    <circle cx="812" cy="289" r="9" fill="#18b36d"/>
    <path d="M765 262h70l-10 20h-50z" fill="#ffb13c"/>
    <text x="800" y="420" text-anchor="middle" font-size="34" fill="#10202a">副業勢</text>
    <text x="800" y="468" text-anchor="middle" font-size="22" fill="#5b7085">LP・小ツール・デモ</text>
    <text x="800" y="498" text-anchor="middle" font-size="22" fill="#5b7085">を早く形にしたい人</text>
    <rect x="680" y="556" width="240" height="46" rx="23" fill="#18b36d"/>
    <text x="800" y="586" text-anchor="middle" font-size="20" fill="#ffffff">作り始める重さを下げる</text>

    <circle cx="1294" cy="300" r="82" fill="#fff0dc"/>
    <rect x="1240" y="270" width="108" height="80" rx="16" fill="#ff8f3d"/>
    <circle cx="1274" cy="306" r="12" fill="#ffffff"/>
    <circle cx="1314" cy="306" r="12" fill="#ffffff"/>
    <path d="M1260 342h68" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="1294" y="420" text-anchor="middle" font-size="34" fill="#10202a">初心者</text>
    <text x="1294" y="468" text-anchor="middle" font-size="22" fill="#5b7085">作りたい気持ちはあるけど</text>
    <text x="1294" y="498" text-anchor="middle" font-size="22" fill="#5b7085">何から始めるか迷う人</text>
    <rect x="1174" y="556" width="240" height="46" rx="23" fill="#ff8f3d"/>
    <text x="1294" y="586" text-anchor="middle" font-size="20" fill="#ffffff">入口を軽く見せる</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial, 'Yu Gothic', 'Meiryo', sans-serif" font-weight="900">
    <rect x="128" y="748" width="1344" height="80" rx="28" fill="#10202a"/>
    <text x="196" y="797" font-size="28" fill="#ffffff">まとめ</text>
    <text x="308" y="797" font-size="24" fill="#d9e7ff">「技術が一番強い」より、</text>
    <text x="566" y="797" font-size="24" fill="#9fffe1">「まず触りたくなる」</text>
    <text x="806" y="797" font-size="24" fill="#d9e7ff">が大きな武器。</text>
  </g>
</svg>
