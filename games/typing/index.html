<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピングラッシュ | よへラボゲーム</title>
  <meta name="description" content="30秒で何語打てるかを競う、短時間タイピングゲーム。" />
  <meta property="og:title" content="タイピングラッシュ | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/typing/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <meta name="theme-color" content="#f5fbff" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="stylesheet" href="/shared/arcade.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.png" alt="よへラボ" />
        <span>よへラボ</span>
      </a>
      <nav class="nav-links">
        <a href="/tools/">ツール</a>
        <a href="/services/">サービス</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">🧪 ブラウザで1分</p>
        <h1>タイピングラッシュ</h1>
        <p>表示された単語を打ってEnter。シンプルだけど、スコアが出るともう一回やりたくなる。</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">入力系</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">スマホ向け</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">登録不要</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">スコア</span><span class="value" id="statScore">0</span></div>
                <div class="arcade-stat"><span class="label">残り時間</span><span class="value" id="statTime">30秒</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">0</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">単語を打ってEnter</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>表示された単語を入力</li><li>Enterで判定</li><li>30秒で何語打てるか競う</li>
            </ul>
            <div class="arcade-tip">30秒で何語打てるかを競う、短時間タイピングゲーム。</div>
            <p style="margin-top:14px;">ゲームは全部ブラウザだけ。サーバーの負荷をほぼ増やさない軽い作り。</p>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.YOHE_GAME = {"slug":"typing","mode":"typing","timeLimit":30,"startText":"単語を打ってEnter","runningText":"タイピング中","hints":["表示された単語を入力","Enterで判定","30秒で何語打てるか競う"],"shareUrl":"https://yohelab.com/games/typing/"};
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
