<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブリンクラッシュ | よへラボゲーム</title>
  <meta name="description" content="一瞬だけ出るターゲットを拾う、反射だけの短距離ゲーム。" />
  <meta property="og:title" content="ブリンクラッシュ | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/blink-rush/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <meta name="theme-color" content="#07120f" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="stylesheet" href="/shared/arcade.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.png" alt="よへラボ" />
        <span>よへラボ</span>
        <span class="brand-sub">ゲーム</span>
      </a>
      <nav class="nav-links">
        <a href="/#tool">AIツール</a>
        <a href="/games/">ゲーム</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">🎮 ブラウザで1分</p>
        <h1>ブリンクラッシュ</h1>
        <p>タップラッシュよりも少し速く、見つけた瞬間に押す感覚を強くした1本。スマホ向け。</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">反射ゲーム</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">スマホ向け</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">登録不要</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">スコア</span><span class="value" id="statScore">0</span></div>
                <div class="arcade-stat"><span class="label">残り時間</span><span class="value" id="statTime">25秒</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">0</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">一瞬で出る丸を押す</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>出たらすぐ押す</li><li>消える前にタップ</li><li>短い集中で終わる</li>
            </ul>
            <div class="arcade-tip">一瞬だけ出るターゲットを拾う、反射だけの短距離ゲーム。</div>
            <p style="margin-top:14px;">ゲームは全部ブラウザだけ。サーバーの負荷をほぼ増やさない軽い作り。</p>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.YOHE_GAME = {"slug":"blink-rush","mode":"tap","timeLimit":25,"startText":"一瞬で出る丸を押す","runningText":"見逃さず押す","hints":["出たらすぐ押す","消える前にタップ","短い集中で終わる"],"shareUrl":"https://yohelab.com/games/blink-rush/"};
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
