<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カラーシーケンス | よへラボゲーム</title>
  <meta name="description" content="光った順番を覚えて同じ順番で押す、記憶力ゲーム。 よへラボの無料ミニゲームとして、スマホとPCのブラウザでそのまま遊べます。" />
  <meta property="og:title" content="カラーシーケンス | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/sequence/" />
  <meta property="og:image" content="https://yohelab.com/assets/og/bunsirube-og.png" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#f5fbff" />
  <link rel="canonical" href="https://yohelab.com/games/sequence/" />
  <link rel="icon" type="image/png" href="/yohelab-icon-32.png" />
  <link rel="stylesheet" href="/shared/site.min.css" />
  <link rel="stylesheet" href="/shared/arcade.min.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.webp" alt="よへラボ" />
        <span>よへラボ</span>
      </a>
      <nav class="nav-links">
        <a href="/lp/bunsirube/">文標</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">🧪 ブラウザで1分</p>
        <h1>カラーシーケンス</h1>
        <p>光った色の順番を覚える。レベルが上がるほど長くなるので、短いけど集中力がいる。</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">記憶</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">スマホ向け</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">登録不要</span><span class="hero-chip" style="background:#ffffff;color:var(--arcade-green);border-color:rgba(16,184,146,.2)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">スコア</span><span class="value" id="statScore">0</span></div>
                <div class="arcade-stat"><span class="label">残り時間</span><span class="value" id="statTime">90秒</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">0</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">光った順番を覚える</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>光った順番を覚える</li><li>同じ順番で押す</li><li>レベルが上がると長くなる</li>
            </ul>
            <div class="arcade-tip">光った順番を覚えて同じ順番で押す、記憶力ゲーム。</div>
            <p style="margin-top:14px;">ゲームは全部ブラウザだけ。サーバーの負荷をほぼ増やさない軽い作り。</p>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© よへラボ / yohelab.com</div>
      <div class="footer-links">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
        <a href="/legal/commerce/">特定商取引法</a>
        <a href="/legal/privacy/">プライバシー</a>
        <a href="/legal/terms/">利用規約</a>
      </div>
    </div>
  </footer>

  <script>
    window.YOHE_GAME = {"slug":"sequence","mode":"sequence","timeLimit":90,"startText":"光った順番を覚える","runningText":"順番を再現する","hints":["光った順番を覚える","同じ順番で押す","レベルが上がると長くなる"],"shareUrl":"https://yohelab.com/games/sequence/"};
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
