<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カラーシーケンス | よへラボゲーム</title>
  <meta name="description" content="光った順番を覚えて同じ順番でタップ。何レベルまで記憶できる？脳トレ系シーケンスゲーム。" />
  <meta property="og:title" content="カラーシーケンス | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/sequence/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <meta name="theme-color" content="#07120f" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="stylesheet" href="/shared/arcade.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.png" alt="よへラボ" />
        <span>よへラボ</span>
        <span class="brand-sub">ゲーム</span>
      </a>
      <nav class="nav-links">
        <a href="/tools/">AIツール</a>
        <a href="/games/">ゲーム</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">🧠 記憶系</p>
        <h1>カラーシーケンス</h1>
        <p>光った順番を覚えて、同じ順番でタップ。レベルが上がるほど長くなる。何レベルまで記憶できる？</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">スマホ対応</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">記憶ゲーム</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">登録不要</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">レベル</span><span class="value" id="statScore">0</span></div>
                <div class="arcade-stat"><span class="label">ステータス</span><span class="value" id="statTime">待機中</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">0</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">光った順番を覚えてタップ</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>光った順番を覚える</li><li>同じ順番でタップ</li><li>レベルが上がるほど長くなる</li>
            </ul>
            <div class="arcade-tip">光った順番を覚えて同じ順番でタップ。脳トレにも。</div>
            <p style="margin-top:14px;">スコアをXでシェアして友達と競おう。</p>
          </aside>
        </div>
        <div class="ad-slot-gameover" id="adSlotGameover">
          <!-- Google AdSense slot -->
        </div>
      </div>
    </section>
  </main>

  <script>
    window.YOHE_GAME = {
      "slug": "sequence",
      "mode": "sequence",
      "timeLimit": 120,
      "hideTimer": true,
      "startText": "光った順番を覚えてタップ",
      "runningText": "シーケンス中",
      "shareText": "カラーシーケンスでレベル {score} まで到達！あなたは？🧠 #よへラボ",
      "hints": ["光った順番を覚える", "同じ順番でタップ", "レベルが上がるほど長くなる"]
    };
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
