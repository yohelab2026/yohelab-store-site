<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オービットエスケープ | よへラボゲーム</title>
  <meta name="description" content="ぐるっと回る障害物を避ける、円周移動の回避ゲーム。" />
  <meta property="og:title" content="オービットエスケープ | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/orbit-escape/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <meta name="theme-color" content="#f5fbff" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="stylesheet" href="/shared/arcade.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.png" alt="よへラボ" />
        <span>よへラボ</span>
        <span class="brand-sub">ブログ</span>
      </a>
      <nav class="nav-links">
        <a href="/apps/research-writer/">ツール</a>
        <a href="/products/page-review/">サービス</a>
        <a href="/blog/">ブログ</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">🎮 ブラウザで1分</p>
        <h1>オービットエスケープ</h1>
        <p>横スクロールじゃなく、円の上を回るので見た目が変わる。短時間で判断が続くタイプ。</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">回避アクション</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">スマホ向け</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">登録不要</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">スコア</span><span class="value" id="statScore">0</span></div>
                <div class="arcade-stat"><span class="label">残り時間</span><span class="value" id="statTime">30秒</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">0</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">左右で回って避ける</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>左回り・右回りで動く</li><li>赤い障害物を避ける</li><li>30秒生き残る</li>
            </ul>
            <div class="arcade-tip">ぐるっと回る障害物を避ける、円周移動の回避ゲーム。</div>
            <p style="margin-top:14px;">ゲームは全部ブラウザだけ。サーバーの負荷をほぼ増やさない軽い作り。</p>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.YOHE_GAME = {"slug":"orbit-escape","mode":"orbit","timeLimit":30,"startText":"左右で回って避ける","runningText":"回避中","hints":["左回り・右回りで動く","赤い障害物を避ける","30秒生き残る"],"shareUrl":"https://yohelab.com/games/orbit-escape/"};
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
