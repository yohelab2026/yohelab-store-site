<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>反応速度テスト | よへラボゲーム</title>
  <meta name="description" content="緑になったら即タップ。あなたの反応速度は何ミリ秒？3回計測して平均を出す。" />
  <meta property="og:title" content="反応速度テスト | よへラボゲーム" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yohelab.com/games/reaction/" />
  <meta property="og:image" content="https://yohelab.com/yohelab-icon.png" />
  <meta name="theme-color" content="#07120f" />
  <link rel="icon" type="image/png" href="/yohelab-icon.png" />
  <link rel="stylesheet" href="/shared/site.css" />
  <link rel="stylesheet" href="/shared/arcade.css" />
</head>
<body>
  <header class="nav lp-nav">
    <div class="nav-inner">
      <a class="brand brand-light" href="/">
        <img src="/yohelab-icon.png" alt="よへラボ" />
        <span>よへラボ</span>
        <span class="brand-sub">ゲーム</span>
      </a>
      <nav class="nav-links">
        <a href="/tools/">AIツール</a>
        <a href="/games/">ゲーム</a>
        <a href="/contact/">問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="arcade-hero">
      <div class="container">
        <p class="arcade-eyebrow">⚡ 反射系</p>
        <h1>反応速度テスト</h1>
        <p>緑になった瞬間にタップ。あなたの反応速度は何ミリ秒？3回計測して平均を出す。友達と比べてみよう。</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;">
          <span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">スマホ対応</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">反応速度</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">登録不要</span><span class="hero-chip" style="background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15)">無料</span>
        </div>
      </div>
    </section>

    <section class="arcade-shell">
      <div class="container">
        <div class="arcade-grid" id="gameRoot">
          <div class="arcade-panel">
            <div class="arcade-top">
              <div class="arcade-stats">
                <div class="arcade-stat"><span class="label">平均反応</span><span class="value" id="statScore">—</span></div>
                <div class="arcade-stat"><span class="label">テスト回数</span><span class="value" id="statTime">0/3</span></div>
                <div class="arcade-stat"><span class="label">ベスト</span><span class="value" id="statBest">—</span></div>
              </div>
              <div class="arcade-actions">
                <button class="btn-arcade primary" id="startBtn">スタート</button>
                <button class="btn-arcade" id="restartBtn">やり直す</button>
              </div>
            </div>
            <div class="arcade-board" id="board">
              <div class="game-banner">READY</div>
            </div>
            <div class="touch-pad" id="touchPad"></div>
            <div class="arcade-footer-note" id="statusText">緑になったら即タップ・クリック</div>
          </div>
          <aside class="arcade-side">
            <h3>遊び方</h3>
            <ul id="hintList">
              <li>緑になった瞬間にタップ</li><li>早押しはペナルティ</li><li>3回の平均で判定</li>
            </ul>
            <div class="arcade-tip">一般的な人の反応速度は200〜300ms。あなたはどのくらい？</div>
            <p style="margin-top:14px;">結果をXでシェアして友達と競おう。</p>
          </aside>
        </div>
        <div class="ad-slot-gameover" id="adSlotGameover">
          <!-- Google AdSense slot -->
        </div>
      </div>
    </section>
  </main>

  <script>
    window.YOHE_GAME = {
      "slug": "reaction",
      "mode": "reaction",
      "timeLimit": 120,
      "hideTimer": true,
      "lowerIsBetter": true,
      "startText": "緑になったら即タップ・クリック",
      "runningText": "待機中…",
      "shareText": "反応速度テスト：平均 {score}ms ⚡ あなたは何ms？ #よへラボ",
      "hints": ["緑になった瞬間にタップ", "早押しはペナルティ", "3回の平均で判定"]
    };
  </script>
  <script src="/shared/arcade-game.js"></script>
</body>
</html>
